name: Build public app (no secrets)

# Public, secret-free desktop build released on THIS public repo, so it can be
# downloaded without a GitHub login. No DATABASE_URL/SECRET_KEY are baked in —
# on first run the app shows the setup page and the user enters their own DB
# connection + access token (saved to ~/.getifyco-listing-portal/config.env).
on:
  workflow_dispatch:
  push:
    tags: ["app-v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install deps
        working-directory: desktop
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Build (no app_config.env -> no secrets bundled)
        working-directory: desktop
        run: pyinstaller --noconfirm --clean Getify.spec

      - name: Verify pythonnet managed assembly bundled (Windows GUI dep)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: desktop
        run: |
          $dll = Get-ChildItem -Recurse dist -Filter Python.Runtime.dll
          if (-not $dll) { Write-Error "Python.Runtime.dll missing — winforms GUI would fail at launch"; exit 1 }
          Write-Host "OK: $($dll[0].FullName)"

      - name: Smoke test (headless boot — expects setup-needed without config)
        working-directory: desktop
        shell: bash
        env:
          GETIFY_HEADLESS: "1"
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./dist/getifyco-listing-portal/getifyco-listing-portal.exe | grep "GETIFY_HEADLESS ok="
          else
            ./dist/getifyco-listing-portal.app/Contents/MacOS/getifyco-listing-portal | grep "GETIFY_HEADLESS ok="
          fi

      - name: Package macOS
        if: runner.os == 'macOS'
        working-directory: desktop/dist
        run: ditto -c -k --keepParent getifyco-listing-portal.app getifyco-listing-portal-macos.zip

      - name: Package Windows
        if: runner.os == 'Windows'
        working-directory: desktop/dist
        shell: pwsh
        run: Compress-Archive -Path getifyco-listing-portal\* -DestinationPath getifyco-listing-portal-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: desktop/dist/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
