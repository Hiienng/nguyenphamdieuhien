name: ETL EtseeMate listing
# table listing_report → table listings
#
# DISABLED 2026-05-15: ETL logic đã được merge inline vào confirm_import flow
# (backend/app/services/EtseeMate_service.py :: sync_listings_from_report).
# listings được sync ngay sau mỗi confirm — không cần chạy định kỳ nữa.
# schedule trigger đã bị comment out; workflow_dispatch giữ lại để chạy thủ công nếu cần.

on:
  # DISABLED — ETL now runs inline inside confirm_import (see EtseeMate_service.py)
  # schedule:
  #   - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install psycopg2-binary

      - name: Run ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python data/etl/etl_listings.py
