<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetifyCo Listing Portal — Cấu hình</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--parchment:#f5f4ed;--ivory:#faf9f5;--near-black:#141413;--charcoal:#4d4c48;--stone:#87867f;--terracotta:#c96442;--border-warm:#e8e6dc;
      --font-serif:Georgia,'Times New Roman',serif;--font-sans:system-ui,-apple-system,'Segoe UI',Arial,sans-serif}
    body{font-family:var(--font-sans);background:var(--parchment);color:var(--near-black);line-height:1.6;padding:40px 28px}
    .wrap{max-width:560px;margin:0 auto}
    .brand{font-family:var(--font-serif);font-size:1.1rem;color:var(--near-black);margin-bottom:4px}
    .brand span{color:var(--terracotta)}
    h1{font-family:var(--font-serif);font-size:1.7rem;font-weight:500;margin:6px 0 8px}
    .sub{font-size:0.9rem;color:var(--charcoal);margin-bottom:24px}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
    label{font-size:0.82rem;font-weight:600;color:var(--charcoal)}
    .hint{font-size:0.74rem;color:var(--stone);font-weight:400}
    input{font-family:var(--font-sans);font-size:0.92rem;padding:10px 13px;border:1px solid var(--border-warm);border-radius:8px;background:var(--ivory);color:var(--near-black);outline:none}
    input:focus{border-color:var(--terracotta)}
    button{width:100%;font-family:var(--font-sans);font-size:0.96rem;font-weight:600;color:var(--ivory);background:var(--terracotta);border:none;border-radius:10px;padding:13px;cursor:pointer;margin-top:6px}
    button:disabled{opacity:.6;cursor:default}
    .err{font-size:0.82rem;color:#b53333;min-height:18px;margin-top:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <p class="brand">GetifyCo<span>.</span></p>
    <h1>Cấu hình lần đầu</h1>
    <p class="sub">Nhập thông tin kết nối do quản trị cung cấp. Thông tin được lưu trên máy bạn, lần sau không cần nhập lại. (Có thể đổi sau trong Settings.)</p>

    <div class="field">
      <label>Database URL <span class="hint">— chuỗi kết nối Postgres/Neon</span></label>
      <input id="db" type="password" placeholder="postgresql://..." autocomplete="off">
    </div>
    <div class="field">
      <label>Access token <span class="hint">— token đăng nhập (SECRET_KEY)</span></label>
      <input id="secret" type="password" placeholder="Dán access token" autocomplete="off">
    </div>
    <button id="save">Lưu &amp; mở app</button>
    <p class="err" id="err"></p>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    function ready(fn){ if (window.pywebview && window.pywebview.api) fn(); else window.addEventListener('pywebviewready', fn); }
    ready(() => {
      $('save').addEventListener('click', async () => {
        const db = $('db').value.trim(), secret = $('secret').value.trim();
        const err = $('err'); err.textContent = '';
        if (!db || !secret) { err.textContent = 'Cần nhập Database URL và Access token.'; return; }
        const btn = $('save'); btn.disabled = true; btn.textContent = 'Đang khởi động...';
        try {
          const res = await window.pywebview.api.save_config(db, secret);
          if (!res || !res.ok) { err.textContent = (res && res.error) || 'Lưu thất bại.'; btn.disabled = false; btn.textContent = 'Lưu & mở app'; }
          // on success the Python side navigates the window to the portal
        } catch (e) {
          err.textContent = 'Lỗi: ' + e; btn.disabled = false; btn.textContent = 'Lưu & mở app';
        }
      });
    });
  </script>
</body>
</html>
