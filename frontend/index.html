<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EtseeMate</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --parchment: #f5f4ed; --ivory: #faf9f5; --near-black: #141413;
      --charcoal: #4d4c48; --stone: #87867f;
      --terracotta: #c96442; --border-warm: #e8e6dc;
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
    }
    body {
      font-family: var(--font-sans);
      background: var(--parchment);
      color: var(--near-black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box {
      background: var(--ivory);
      border: 1px solid var(--border-warm);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.05);
    }
    .brand {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--stone);
      margin-bottom: 28px;
    }
    .brand span { color: var(--terracotta); }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--stone); }
    input {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      padding: 10px 14px;
      border: 1px solid var(--border-warm);
      border-radius: 10px;
      background: var(--parchment);
      color: var(--near-black);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--terracotta); }
    .error { font-size: 0.82rem; color: #b53333; min-height: 18px; }
    button {
      width: 100%;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ivory);
      background: var(--terracotta);
      border: none;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="box">
    <p class="brand">EtseeMate<span>.</span></p>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Mật khẩu</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <p id="error" class="error"></p>
    </div>
    <button id="btn">Đăng nhập</button>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const err   = document.getElementById('error');
      const btn   = document.getElementById('btn');
      err.textContent = '';
      if (!email || !pass) { err.textContent = 'Vui lòng nhập email và mật khẩu.'; return; }
      btn.disabled = true; btn.textContent = 'Đang đăng nhập…';
      try {
        const res  = await fetch('/api/v1/auth/login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { err.textContent = data.detail || 'Đăng nhập thất bại.'; return; }
        sessionStorage.setItem('etseemate_token', data.access_token);
        window.location.href = '/etseemate.html';
      } catch { err.textContent = 'Lỗi kết nối. Thử lại.'; }
      finally { btn.disabled = false; btn.textContent = 'Đăng nhập'; }
    }

    document.getElementById('btn').addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    // Auto-redirect nếu đã có refresh token
    (async () => {
      const res = await fetch('/api/v1/auth/refresh', { method: 'POST', credentials: 'include' }).catch(() => null);
      if (res && res.ok) window.location.href = '/etseemate.html';
    })();
  </script>
</body>
</html>
