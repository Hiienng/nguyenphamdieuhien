  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --font-sans:  'Inter', 'Helvetica Neue', Arial, sans-serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      --font-serif: 'Georgia', serif;
      --near-black:   #1a1714;
      --charcoal:     #2c2825;
      --stone:        #7a7370;
      --parchment:    #f5f1ec;
      --warm-sand:    #ede8e1;
      --border-cream: #ddd8d0;
      --terracotta:   #c0714a;
      --bg:           #faf7f4;
    }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--charcoal); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .nav { height: 52px; display: flex; align-items: center; padding: 0 24px; gap: 24px; background: var(--parchment); border-bottom: 1px solid var(--border-cream); flex-shrink: 0; }

    .nav-brand span { color: var(--terracotta); }
    .nav-back { font-size: 0.80rem; color: var(--stone); text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .nav-back:hover { color: var(--charcoal); }
    .nav-title { font-size: 0.80rem; font-weight: 600; color: var(--charcoal); letter-spacing: 0.04em; text-transform: uppercase; }
    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 240px; flex-shrink: 0; background: var(--parchment); border-right: 1px solid var(--border-cream); overflow-y: auto; padding: 16px 0; }
    .sidebar-section { padding: 0 12px 8px; font-size: 0.64rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--stone); }
    .sidebar-item { display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer; padding: 7px 16px; font-family: var(--font-sans); font-size: 0.78rem; color: var(--charcoal); line-height: 1.4; border-left: 3px solid transparent; transition: background 0.1s, border-color 0.1s; }
    .sidebar-item:hover { background: var(--warm-sand); }
    .sidebar-item.active { border-left-color: var(--terracotta); background: var(--warm-sand); font-weight: 600; color: var(--terracotta); }
    .sidebar-item.is-docx { color: var(--stone); font-style: italic; }
    .sidebar-item.is-docx::after { content: ' .docx'; font-size: 0.64rem; opacity: 0.6; }
    .content { flex: 1; overflow-y: auto; padding: 36px 48px; max-width: 900px; }
    .doc-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--stone); }

    .doc-placeholder p { font-size: 0.84rem; }
    .docx-notice { display: flex; flex-direction: column; gap: 10px; padding: 24px; border: 1px solid var(--border-cream); border-radius: 8px; background: var(--parchment); max-width: 480px; }
    .docx-notice strong { font-size: 0.90rem; }
    .docx-notice p { font-size: 0.80rem; color: var(--stone); line-height: 1.6; }
    .docx-notice a { font-size: 0.80rem; color: var(--terracotta); font-weight: 600; }
    .md-body { font-size: 0.88rem; line-height: 1.75; color: var(--charcoal); }
    .md-body h1 { font-family: var(--font-serif); font-size: 1.60rem; font-weight: 700; margin-bottom: 20px; color: var(--near-black); border-bottom: 2px solid var(--border-cream); padding-bottom: 10px; }
    .md-body h2 { font-size: 1.10rem; font-weight: 700; margin: 28px 0 10px; color: var(--near-black); }
    .md-body h3 { font-size: 0.94rem; font-weight: 700; margin: 20px 0 8px; color: var(--charcoal); }
    .md-body h4 { font-size: 0.86rem; font-weight: 700; margin: 16px 0 6px; color: var(--stone); text-transform: uppercase; letter-spacing: 0.05em; }
    .md-body p { margin-bottom: 12px; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin-bottom: 4px; }
    .md-body code { font-family: var(--font-mono); font-size: 0.80rem; background: var(--warm-sand); border: 1px solid var(--border-cream); border-radius: 3px; padding: 1px 5px; color: var(--terracotta); }
    .md-body pre { background: var(--warm-sand); border: 1px solid var(--border-cream); border-radius: 6px; padding: 14px 16px; overflow-x: auto; margin: 12px 0; }
    .md-body pre code { background: none; border: none; padding: 0; color: var(--charcoal); font-size: 0.78rem; }
    .md-body blockquote { border-left: 3px solid var(--terracotta); padding: 6px 14px; margin: 12px 0; color: var(--stone); background: var(--warm-sand); border-radius: 0 4px 4px 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.82rem; }
    .md-body th { background: var(--warm-sand); font-weight: 700; text-align: left; padding: 6px 10px; border: 1px solid var(--border-cream); }
    .md-body td { padding: 6px 10px; border: 1px solid var(--border-cream); }
    .md-body tr:nth-child(even) td { background: var(--parchment); }
    .md-body a { color: var(--terracotta); text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border-cream); margin: 24px 0; }
    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }

<script>
const DOCS = [
  { label: "Flow 01 \u2014 Performance Hub", group: "flows", content: "# Flow 01 \u2014 Performance Hub / Listing Performance\n\nFeature: snapshot hi\u1ec7u su\u1ea5t listing theo 3 ch\u1ec9 s\u1ed1 **CTR / CR / ROAS**.\nUI pill: `perf-sub-performance`.\n\n## Sequence flow\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor U as User\n    participant FE as index.html (JS)\n    participant API as /api/v1/performance\n    participant SVC as performance_service\n    participant DB as Postgres (Neon)\n    participant CACHE as data/processed/<br/>performance_dashboard.json\n\n    U->>FE: Ch\u1ecdn tab \"Performance Hub\"\n    FE->>CACHE: GET performance_dashboard.json\n    alt Cache t\u1ed3n t\u1ea1i\n        CACHE-->>FE: listings[] (k\u00e8m scenario, ref)\n    else Cache r\u1ed7ng / user click \"T\u1ea3i l\u1ea1i\"\n        FE->>API: POST /performance/refresh\n        API->>SVC: get_dashboard_listings(db)\n        SVC->>DB: SELECT listing_report<br/>JOIN scenarios_rules<br/>LATERAL JOIN market_listing\n        DB-->>SVC: rows\n        SVC->>CACHE: write_dashboard_json()\n        API-->>FE: {ok: true}\n        FE->>CACHE: GET performance_dashboard.json\n        CACHE-->>FE: listings[]\n    end\n    FE->>FE: T\u00ednh KPI (avg CTR/CR/ROAS)<br/>L\u1ecdc best_performers / quick_win\n    FE-->>U: Render hero KPI + charts + b\u1ea3ng\n```\n\n## Data flow (t\u1ea7ng d\u1eef li\u1ec7u)\n\n```mermaid\nflowchart LR\n    subgraph DB[(Postgres)]\n        LR[listing_report]\n        SR[scenarios_rules]\n        ML[market_listing]\n    end\n\n    LR -- \"GROUP BY listing_id<br/>(latest period)\" --> CTE[CTE 'lr']\n    CTE -- \"CTR / CR / ROAS bands\" --> JOIN1{{JOIN}}\n    SR --> JOIN1\n    CTE --> LAT[LATERAL subquery]\n    ML -- \"product_type LIKE lr.product<br/>ORDER BY price*review_count\" --> LAT\n    JOIN1 --> OUT[rows: metrics + action + ref]\n    LAT --> OUT\n    OUT --> JSON[performance_dashboard.json]\n    JSON --> FE[Frontend charts]\n```\n\n## Th\u00e0nh ph\u1ea7n UI\n\n| Ph\u1ea7n | T\u00ednh to\u00e1n | Ngu\u1ed3n |\n|---|---|---|\n| Hero CTR / CR / ROAS | `avg()` to\u00e0n b\u1ed9 listing | JSON |\n| Best Performers | `ctr \u2265 2% AND cr \u2265 4% AND roas \u2265 2` | JSON |\n| Quick Win | `cr \u2265 4% AND ctr < 2%` | JSON |\n| Chart gap | `metric - benchmark` theo product | JSON |\n| Portfolio donut | count listing / product | JSON |\n\n## Schema ch\u1ea1m t\u1edbi\n\n- `listing_report` \u2014 s\u1ed1 li\u1ec7u g\u1ed1c (views, clicks, orders, revenue, spend, roas)\n- `scenarios_rules` \u2014 g\u1eafn `action`/`case_name` cho t\u1eebng listing\n- `market_listing` \u2014 t\u00ecm reference competitor (title, shop_name)\n\n## \u0110\u1ea7u ra ph\u00eda FE\n\nObject JSON m\u1ed7i listing (r\u00fat g\u1ecdn):\n```json\n{\n  \"listing_id\": \"1234567890\",\n  \"title\": \"...\",\n  \"product\": \"baby romper\",\n  \"ctr\": 2.1, \"cr\": 4.3, \"roas\": 2.8,\n  \"ctr_level\": \"high\", \"cr_level\": \"high\", \"roas_band\": \"profitable\",\n  \"scenario_action\": \"keep\",\n  \"scenario_label\": \"C\u00f3 sales v\u00e0 \u0111ang l\u1eddi\",\n  \"ref_title\": \"...\", \"ref_shop\": \"...\"\n}\n```\n" },
  { label: "Flow 02 \u2014 Listing Improvement", group: "flows", content: "# Flow 02 \u2014 Listing Improvement\n\nFeature: g\u1ee3i \u00fd h\u00e0nh \u0111\u1ed9ng (`keep` / `improve` / `improve_or_off`) cho t\u1eebng listing d\u1ef1a tr\u00ean ma tr\u1eadn `scenarios_rules`.\nUI pill: `perf-sub-improvement`.\n\n---\n\n## Sequence flow\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor U as User\n    participant FE as index.html (JS)\n    participant CACHE as performance_dashboard.json\n    participant API as /api/v1/performance/refresh\n    participant SVC as performance_service\n    participant DB as Postgres\n\n    U->>FE: Ch\u1ecdn pill \"Listing Improvement\"\n    FE->>CACHE: GET performance_dashboard.json\n    CACHE-->>FE: listings[] (\u0111\u00e3 embed scenario_action, fix_listing, fix_ads)\n\n    U->>FE: Ch\u1ecdn filter<br/>(product / VM / CTR / CR / ROAS)\n    FE->>FE: renderImprTable()<br/>l\u1ecdc + sort theo action priority\n\n    FE-->>U: Render b\u1ea3ng improvement\n\n    opt S\u1ed1 li\u1ec7u stale \u2192 T\u1ea3i l\u1ea1i\n        U->>FE: Click \"T\u1ea3i l\u1ea1i\"\n        FE->>API: POST /performance/refresh\n        API->>SVC: get_dashboard_listings(db)\n        SVC->>DB: SELECT listing_report<br/>JOIN scenarios_rules<br/>LATERAL JOIN market_listing\n        DB-->>SVC: rows\n        SVC->>CACHE: write_dashboard_json()\n        API-->>FE: {ok: true}\n        FE->>CACHE: GET performance_dashboard.json\n        FE-->>U: Re-render b\u1ea3ng\n    end\n```\n\n---\n\n## Logic classification (band \u2192 scenario)\n\n```mermaid\nflowchart LR\n    LR[listing_report row] --> ROAS{ROAS}\n    ROAS -->|\"\u2265 2.0\"| P[\"profitable\"]\n    ROAS -->|\"1.0 \u2013 1.99\"| S[\"slight_loss\"]\n    ROAS -->|\"0 < r < 1.0\"| H[\"heavy_loss\"]\n    ROAS -->|\"= 0\"| N[\"no_sales\"]\n\n    LR --> CTR{CTR}\n    CTR -->|\"\u2265 1.5%\"| CH[\"high\"]\n    CTR -->|\"< 1.5%\"| CL[\"low\"]\n\n    LR --> CR{CR}\n    CR -->|\"\u2265 3%\"| RH[\"high\"]\n    CR -->|\"< 3%\"| RL[\"low / zero\"]\n\n    P --> J[(\"scenarios_rules\\nJOIN\")]\n    S --> J\n    H --> J\n    N --> J\n    CH --> J\n    CL --> J\n    RH --> J\n    RL --> J\n\n    J --> A1[\"keep \ud83d\udfe2\"]\n    J --> A2[\"improve \ud83d\udfe1\"]\n    J --> A3[\"improve_or_off \ud83d\udd34\"]\n```\n\n---\n\n## Ma tr\u1eadn 14 k\u1ecbch b\u1ea3n (seeded b\u1edfi `seed_scenarios()`)\n\n| # | ROAS band | CR | CTR | Case | Action | \u01afu ti\u00ean |\n|---|---|---|---|---|---|---|\n| 1 | profitable | high | high | C\u00f3 sales v\u00e0 \u0111ang l\u1eddi | **keep** | 3 |\n| 2 | profitable | low | high | C\u00f3 sales v\u00e0 \u0111ang l\u1eddi | **improve** | 2 |\n| 3 | profitable | high | low | C\u00f3 sales v\u00e0 \u0111ang l\u1eddi | **improve** | 2 |\n| 4 | profitable | low | low | C\u00f3 sales v\u00e0 \u0111ang l\u1eddi | **improve** | 2 |\n| 5 | slight_loss | high | high | C\u00f3 sales, \u0111ang l\u1ed7 nh\u1eb9 | **improve** | 2 |\n| 6 | slight_loss | high | low | C\u00f3 sales, \u0111ang l\u1ed7 nh\u1eb9 | **improve** | 2 |\n| 7 | slight_loss | low | high | C\u00f3 sales, \u0111ang l\u1ed7 nh\u1eb9 | **improve** | 2 |\n| 8 | slight_loss | low | low | C\u00f3 sales, \u0111ang l\u1ed7 nh\u1eb9 | **improve** | 2 |\n| 9 | heavy_loss | high | high | C\u00f3 sales, l\u1ed7 n\u1eb7ng | **improve** | 2 |\n| 10 | heavy_loss | low | high | C\u00f3 sales, l\u1ed7 n\u1eb7ng | **improve** | 2 |\n| 11 | heavy_loss | high | low | C\u00f3 sales, l\u1ed7 n\u1eb7ng | **improve** | 2 |\n| 12 | heavy_loss | low | low | C\u00f3 sales, l\u1ed7 n\u1eb7ng | **improve_or_off** | 1 |\n| 13 | no_sales | zero | high | Kh\u00f4ng c\u00f3 sale, c\u00f3 clicks | **improve_or_off** | 1 |\n| 14 | no_sales | zero | low | Kh\u00f4ng c\u00f3 sale, c\u00f3 clicks | **improve_or_off** | 1 |\n\nNg\u01b0\u1ee1ng: CTR \u2265 **1.5%** = high \u00b7 CR \u2265 **3%** = high \u00b7 ROAS break-even = **2.0**\n\n---\n\n## G\u1ee3i \u00fd fix theo t\u1eebng k\u1ecbch b\u1ea3n \u0111\u1eb7c tr\u01b0ng\n\n| K\u1ecbch b\u1ea3n | Cause ti\u00eau bi\u1ec3u | Fix Listing | Fix Ads |\n|---|---|---|---|\n| `profitable` + CR low | Listing ch\u01b0a \u0111\u1ee7 h\u1ea5p d\u1eabn, keywords ads ch\u01b0a t\u1ed1i \u01b0u | Ki\u1ec3m tra gi\u00e1, ship, review, h\u00ecnh chi ti\u1ebft, options | T\u1eaft keywords k\u00e9m hi\u1ec7u qu\u1ea3 |\n| `profitable` + CTR low | H\u00ecnh main ch\u01b0a \u0111\u00fang intent, gi\u00e1 m\u00f2i cao | T\u1ed1i \u01b0u keywords, h\u00ecnh main, alt, gi\u00e1 m\u00f2i | T\u1eaft keywords kh\u00f4ng \u0111\u00fang intent |\n| `slight_loss` b\u1ea5t k\u1ef3 | Views/clicks th\u1ea5p ho\u1eb7c AOV kh\u00f4ng cover ads spend | S\u1eeda keywords long-tail, h\u00ecnh main, gi\u00e1 m\u00f2i | T\u1eaft keywords r\u1ed9ng/c\u1ea1nh tranh cao |\n| `heavy_loss` + low/low | Listing ch\u01b0a t\u1ed1i \u01b0u; n\u1ebfu \u0111\u00e3 t\u1ed1i \u01b0u m\u00e0 kh\u00f4ng c\u1ea3i thi\u1ec7n \u2192 t\u1eaft | C\u00f9ng nh\u01b0 tr\u00ean + ki\u1ec3m tra review x\u1ea5u | T\u1eaft ads |\n| `no_sales` + high clicks | Listing m\u1edbi (theo d\u00f5i th\u00eam) ho\u1eb7c m\u1ea5t index | \u0110\u1ed5i long-tail keywords, up \u1ea3nh chi ti\u1ebft, xin reviews | T\u1eaft keywords kh\u00f4ng li\u00ean quan |\n| `no_sales` + low clicks | Listing m\u1ea5t index ho\u1eb7c intent kh\u00f4ng kh\u1edbp | Deactive \u2192 reactive l\u1ea1i listing + fix keywords | T\u1eaft ads |\n\n---\n\n## B\u1ea3ng improvement \u2014 c\u1ea5u tr\u00fac c\u1ed9t UI\n\n| C\u1ed9t | Ngu\u1ed3n tr\u01b0\u1eddng | Hi\u1ec3n th\u1ecb |\n|---|---|---|\n| Listing title | `listing_report.title` | Link \u2192 Etsy URL |\n| Product | derived t\u1eeb `category` | Badge |\n| VM | `listing_report.no_vm` | Text |\n| CTR | Numeric | Badge xanh/v\u00e0ng/\u0111\u1ecf |\n| CR | Numeric | Badge xanh/v\u00e0ng/\u0111\u1ecf |\n| ROAS | Numeric | Badge theo band |\n| Case | `scenarios_rules.case_name` | Text |\n| Action | `scenarios_rules.action` | \ud83d\udfe2 keep / \ud83d\udfe1 improve / \ud83d\udd34 improve_or_off |\n| Cause | `scenarios_rules.cause` | Expand/tooltip |\n| Fix Listing | `scenarios_rules.fix_listing` | Checklist expand |\n| Fix Ads | `scenarios_rules.fix_ads` | Checklist expand |\n\n---\n\n## Sort & pagination\n\n```mermaid\nflowchart LR\n    Raw[\"listings[] t\u1eeb JSON\"] --> F1[\"Filter client-side\\n(product, VM, CTR/CR/ROAS levels)\"]\n    F1 --> S1[\"Sort priority:\\n1 = improve_or_off\\n2 = improve\\n3 = keep\\n\u2192 roas ASC NULLS LAST\"]\n    S1 --> P1[\"Pagination 20 rows/trang\\n+ Load More button\"]\n    P1 --> UI[\"B\u1ea3ng improvement\"]\n```\n\n---\n\n## Schema ch\u1ea1m t\u1edbi\n\n| B\u1ea3ng | Vai tr\u00f2 |\n|---|---|\n| `listing_report` | CTR / CR / ROAS th\u1ef1c t\u1ebf + metadata |\n| `scenarios_rules` | 14-row matrix \u2192 action + cause + fix guide |\n| `listings` | (optional) link Etsy, title chu\u1ea9n ho\u00e1 |\n" },
  { label: "Flow 03 \u2014 Listing Scale-up", group: "flows", content: "# Flow 03 \u2014 Listing Scale Up\n\nFeature: x\u00e1c \u0111\u1ecbnh listing \u0111ang \"bay\" (CTR / CR / ROAS \u0111\u1ec1u \u0111\u1ea1t ng\u01b0\u1ee1ng) \u0111\u1ec3 \u0111\u1ec1 xu\u1ea5t n\u00e2ng ng\u00e2n s\u00e1ch ho\u1eb7c nh\u00e2n r\u1ed9ng.\nUI pill: `perf-sub-scaleup`.\n\n## Sequence flow\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor U as User\n    participant FE as index.html (JS)\n    participant CACHE as performance_dashboard.json\n    participant API as /api/v1/performance/refresh\n    participant SVC as performance_service\n    participant DB as Postgres\n\n    U->>FE: Ch\u1ecdn pill \"Listing Scale Up\"\n    FE->>CACHE: GET performance_dashboard.json\n    CACHE-->>FE: listings[]\n    FE->>FE: Filter scale-up candidates<br/>(action='keep', ROAS \u2265 2.5,<br/>CR \u2265 4%, CTR \u2265 2%)\n    FE->>FE: Build bubble chart<br/>(x=CR, y=ROAS, size=revenue)\n    U->>FE: Ch\u1ecdn filter product / VM\n    FE-->>U: Bubble chart + b\u1ea3ng candidates\n    opt C\u1ea7n rebuild\n        U->>FE: Click \"T\u1ea3i l\u1ea1i\"\n        FE->>API: POST /performance/refresh\n        API->>SVC: get_dashboard_listings()\n        SVC->>DB: SELECT listing_report + JOIN\n        DB-->>SVC: rows\n        SVC->>CACHE: write_dashboard_json()\n    end\n```\n\n## Logic ch\u1ecdn candidate\n\n```mermaid\nflowchart TD\n    All[listings t\u1eeb dashboard] --> F1{action = 'keep'?}\n    F1 -->|no| Drop1[[Lo\u1ea1i]]\n    F1 -->|yes| F2{ROAS \u2265 2.5?}\n    F2 -->|no| Drop2[[Lo\u1ea1i]]\n    F2 -->|yes| F3{CR \u2265 4% & CTR \u2265 2%?}\n    F3 -->|no| Drop3[[Lo\u1ea1i]]\n    F3 -->|yes| F4{Doanh thu<br/>lifetime_revenue \u2265 p50?}\n    F4 -->|no| Watchlist[[Watchlist]]\n    F4 -->|yes| Scale[[Scale candidate]]\n    Scale --> Bubble[Bubble chart + b\u1ea3ng]\n```\n\n## Bubble chart mapping\n\n| Tr\u1ee5c | Gi\u00e1 tr\u1ecb | Gi\u1ea3i th\u00edch |\n|---|---|---|\n| X | `cr` | T\u1ec9 l\u1ec7 convert |\n| Y | `roas` | L\u1ee3i nhu\u1eadn ads |\n| Size | `revenue` (period g\u1ea7n nh\u1ea5t) | \u0110\u1ed9 l\u1edbn \u0111\u00f3ng g\u00f3p doanh thu |\n| Color | product group | Ph\u00e2n bi\u1ec7t baby romper / blanket / onesie |\n| Label | `title` (r\u00fat g\u1ecdn) + VM | Tooltip \u0111\u1ea7y \u0111\u1ee7 |\n\n## B\u1ea3ng candidates (c\u1ea5u tr\u00fac c\u1ed9t)\n\n| C\u1ed9t | Ngu\u1ed3n |\n|---|---|\n| Listing | `listing_report.title` + link Etsy |\n| Product | derived t\u1eeb `category` |\n| VM | `no_vm` |\n| CTR / CR / ROAS | Numeric badge |\n| Revenue (period) | `revenue` |\n| Lifetime revenue | `lifetime_orders \u00d7 price` ho\u1eb7c `lifetime_revenue` |\n| Reference market | `ref_title`, `ref_shop` t\u1eeb LATERAL JOIN `market_listing` |\n| Suggest action | \"T\u0103ng budget +30%\" / \"Nh\u00e2n b\u1ea3n sang shop kh\u00e1c\" |\n\n## Schema ch\u1ea1m t\u1edbi\n\n- `listing_report` \u2014 metric g\u1ed1c + lifetime\n- `scenarios_rules` \u2014 ch\u1ec9 l\u1ea5y `action='keep'`\n- `market_listing` \u2014 reference so s\u00e1nh v\u1edbi top competitor\n\n## H\u00e0nh \u0111\u1ed9ng sau khi ch\u1ecdn\n\n```mermaid\nflowchart LR\n    Pick[User ch\u1ecdn candidate] --> A1[Note: t\u0103ng budget]\n    Pick --> A2[Export list \u2192 Etsy Ads Manager]\n    Pick --> A3[\u0110\u01b0a v\u00e0o backlog<br/>nh\u00e2n b\u1ea3n shop kh\u00e1c]\n```\n" },
  { label: "Flow 04 \u2014 Internal Import", group: "flows", content: "# Flow 04 \u2014 Internal Ads Import\n\nFeature: chuy\u1ec3n screenshot b\u00e1o c\u00e1o ads Etsy \u2192 DB (`listing_report` + `keyword_report`) qua 3 stage + 2 \u0111\u01b0\u1eddng h\u1ed3i ph\u1ee5c.\nUI pill: `perf-sub-import`.\n\n## High-level state machine\n\n```mermaid\nstateDiagram-v2\n    [*] --> uploaded: POST /internal/upload\n    uploaded --> extracted: POST /internal/extract<br/>(Claude/Gemini Vision)\n    uploaded --> discarded: POST /internal/discard\n    extracted --> confirmed: POST /internal/confirm\n    extracted --> discarded: POST /internal/discard\n    confirmed --> rolled_back: POST /internal/rollback\n    discarded --> [*]\n    rolled_back --> [*]\n```\n\n## Sequence \u2014 happy path\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor U as User\n    participant FE as index.html (JS)\n    participant API as /api/v1/internal\n    participant SVC as internal_service\n    participant EXT as internal_extractor\n    participant VIS as Claude/Gemini Vision\n    participant FS as data/raw/internal/<br/>{batch_id}/\n    participant SNAP as data/processed/<br/>snapshots/{batch_id}.json\n    participant DB as Postgres\n\n    U->>FE: Drag PNG/JPG/WebP +<br/>nh\u1eadp VM, importer name\n    FE->>FE: Validate MIME, size, k\u00edch th\u01b0\u1edbc\n    FE->>API: POST /upload (multipart)\n    API->>SVC: save_uploaded_files(files, db)\n    SVC->>FS: Ghi t\u1eebng \u1ea3nh\n    SVC->>DB: INSERT import_batch<br/>(status='uploaded')\n    API-->>FE: {batch_id, file_count}\n\n    U->>FE: Click \"Extract\"\n    FE->>API: POST /extract?batch_id=...\n    API->>SVC: run_extraction(batch_id)\n    SVC->>EXT: extract_batch()\n    loop m\u1ed7i \u1ea3nh (concurrency=5)\n        EXT->>VIS: call vision API (retry 3\u00d7)\n        VIS-->>EXT: JSON (type A / B)\n    end\n    EXT->>EXT: _merge_results()<br/>(aggregate theo listing_id)\n    EXT->>FS: L\u01b0u extracted.json\n    SVC->>DB: UPDATE import_batch<br/>(status='extracted', progress=100)\n    API-->>FE: {listing_report[], keyword_report[]}\n    FE-->>U: 2 b\u1ea3ng editable \u0111\u1ec3 QA\n\n    U->>FE: Ch\u1ec9nh s\u1eeda (n\u1ebfu c\u1ea7n) + Confirm\n    FE->>API: POST /confirm<br/>{batch_id, listing_report[], keyword_report[]}\n    API->>SVC: confirm_import()\n    SVC->>DB: DELETE WHERE (listing_id, period, no_vm)\n    SVC->>DB: INSERT listing_report + keyword_report\n    SVC->>SNAP: Ghi snapshot JSON\n    SVC->>FS: Xo\u00e1 raw images\n    SVC->>DB: UPDATE import_batch<br/>(status='confirmed', confirmed_at=now())\n    API-->>FE: {imported: true, rows: {listing, keyword}}\n    FE-->>U: \"Import th\u00e0nh c\u00f4ng\"\n```\n\n## Sequence \u2014 discard / rollback\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor U as User\n    participant FE as index.html (JS)\n    participant API as /api/v1/internal\n    participant SVC as internal_service\n    participant FS as data/raw/internal/\n    participant SNAP as snapshots/\n    participant DB as Postgres\n\n    alt Discard (ch\u01b0a confirm)\n        U->>FE: Click \"Hu\u1ef7 batch\"\n        FE->>API: POST /discard?batch_id=...\n        API->>SVC: discard_batch()\n        SVC->>FS: Xo\u00e1 raw images\n        SVC->>DB: UPDATE import_batch<br/>(status='discarded')\n        API-->>FE: {ok: true}\n    else Rollback (\u0111\u00e3 confirm)\n        U->>FE: Click \"Rollback\" tr\u00ean history\n        FE->>API: POST /rollback?batch_id=...\n        API->>SVC: rollback_batch()\n        SVC->>SNAP: Load snapshot JSON\n        SVC->>DB: DELETE listing_report<br/>WHERE (listing_id, period, no_vm)<br/>theo snapshot\n        SVC->>DB: DELETE keyword_report ...\n        SVC->>DB: UPDATE import_batch<br/>(status='rolled_back')\n        API-->>FE: {ok: true}\n    end\n```\n\n## Vision classification\n\n```mermaid\nflowchart LR\n    Img[\u1ea2nh screenshot] --> VIS[Claude/Gemini Vision]\n    VIS --> CLS{Ph\u00e2n lo\u1ea1i}\n    CLS -->|Listing summary| A[Type A<br/>listing_id, title, price, stock,<br/>category, lifetime_*, metrics period]\n    CLS -->|Keyword table| B[Type B<br/>keyword, roas, orders,<br/>spend, revenue, clicks,<br/>click_rate, views]\n    A --> Merge[_merge_results<br/>aggregate by listing_id]\n    B --> Merge\n    Merge --> Preview[listing_report[] +<br/>keyword_report[]]\n```\n\n## Validation (stage upload)\n\n| Check | Ng\u01b0\u1ee1ng |\n|---|---|\n| MIME/magic bytes | `png` / `jpeg` / `webp` |\n| File size | 10 KB \u2264 size \u2264 20 MB |\n| K\u00edch th\u01b0\u1edbc \u1ea3nh | \u2265 200 \u00d7 200 px |\n| VM code | kh\u00f4ng r\u1ed7ng |\n| Importer | kh\u00f4ng r\u1ed7ng |\n\n## Schema ch\u1ea1m t\u1edbi\n\n| B\u1ea3ng | Vai tr\u00f2 |\n|---|---|\n| `import_batch` | state machine + progress |\n| `listing_report` | ghi d\u1eef li\u1ec7u sau confirm, xo\u00e1 khi rollback |\n| `keyword_report` | ghi d\u1eef li\u1ec7u sau confirm, xo\u00e1 khi rollback |\n\n## File system paths\n\n| Path | Lifecycle |\n|---|---|\n| `data/raw/internal/{batch_id}/*.png` | T\u1ea1o khi upload, xo\u00e1 khi confirm/discard |\n| `data/raw/internal/{batch_id}/extracted.json` | T\u1ea1o khi extract |\n| `data/processed/snapshots/{batch_id}.json` | T\u1ea1o khi confirm (\u0111\u1ec3 rollback) |\n\n## Kho\u00e1 t\u1ef1 nhi\u00ean khi ghi DB\n\n```\n(listing_id, period, no_vm)  \u2192 xo\u00e1 c\u0169, insert m\u1edbi\n```\n\n\u0110\u1ea3m b\u1ea3o re-import c\u00f9ng period kh\u00f4ng t\u1ea1o b\u1ea3n ghi tr\u00f9ng.\n" },
  { label: "Flow 05 \u2014 Research Hub", group: "flows", content: "# Flow 05 \u2014 Research Hub (Market Trend Intelligence)\n\nFeature: ph\u00e2n t\u00edch d\u1eef li\u1ec7u Etsy crawl \u0111\u1ec3 ch\u1ecdn s\u1ea3n ph\u1ea9m **sewable** (may \u0111\u01b0\u1ee3c) \u2014 \u01b0u ti\u00ean hot rate, gi\u00e1 $30\u2013$130, review \u2265 200.\nUI tab: `tab-research`.\n\n## Sequence flow\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor U as User\n    participant FE as index.html (JS)\n    participant API as /api/v1/market\n    participant DB as Postgres<br/>(market_listing)\n    participant CR as data/crawler/<br/>crawl_weekly.py\n\n    Note over CR,DB: Weekly cron (offline)\n    CR->>DB: INSERT INTO market_listing<br/>(products.db \u2192 Postgres sync)\n\n    U->>FE: Ch\u1ecdn tab \"Research Hub\"\n    FE->>API: GET /market/samples\n    API->>DB: SELECT product_type, sample URLs<br/>FROM market_listing<br/>GROUP BY product_type\n    DB-->>API: rows\n    API-->>FE: samples by product_type\n\n    FE->>FE: Load dataset aggregate<br/>(c\u00f3 th\u1ec3 qua JSON cache)\n    FE->>FE: L\u1ecdc sewable-only<br/>(whitelist product_type)\n    FE->>FE: Compute metrics:<br/>market_share, hot_rate,<br/>price_range, discount\u2026\n    FE-->>U: Render 8 chart + danh s\u00e1ch priority\n```\n\n## Crawler pipeline (offline, ch\u1ea1y weekly)\n\n```mermaid\nflowchart LR\n    URLS[data/crawler/<br/>search_urls.csv] --> CR[crawl_weekly.py]\n    CR --> SHOT[screenshot_crawler<br/>(Playwright)]\n    SHOT --> IMG[data/crawler/output/<br/>screenshots/*.png]\n    IMG --> VA[vision_extractor<br/>(Gemini)]\n    VA --> JSON[products.json / CSV]\n    JSON --> SQLITE[data/crawler/output/<br/>products.db (SQLite)]\n    SQLITE --> SYNC[save_postgres \u2192<br/>market_listing]\n    SYNC --> PG[(market_listing<br/>Postgres)]\n```\n\n## Dataset filter \u2014 \"Sewable-only\"\n\nWhitelist \u00e1p d\u1ee5ng \u1edf t\u1ea7ng FE (c\u00f3 th\u1ec3 server-side v\u1ec1 sau):\n\n| Cho ph\u00e9p | Lo\u1ea1i |\n|---|---|\n| baby romper / onesie / bodysuit / sweater | \u2705 |\n| baby blanket / swaddle / keepsake album | \u2705 |\n| denim jacket / fabric bag / storage basket (fabric) | \u2705 |\n| plush toy (fabric) | \u2705 |\n\nLo\u1ea1i tr\u1eeb: pottery, wood sign, ceramic, metal, electronics (kh\u00f4ng may \u0111\u01b0\u1ee3c).\n\n## 8 chart trong Research Hub\n\n```mermaid\nflowchart TB\n    DS[market_listing<br/>(filtered sewable)] --> C1[chartMarketShare<br/>pie: listing / product]\n    DS --> C2[chartListingCount<br/>bar: count]\n    DS --> C3[chartHotRanking<br/>ranking by hot_rate]\n    DS --> C4[chartHotRate<br/>% badge / total]\n    DS --> C5[chartTagHotRate<br/>tag cloud]\n    DS --> C6[chartPriceRange<br/>histogram price]\n    DS --> C7[chartDiscount<br/>scatter: discount vs review]\n    DS --> C8[chartEmerging +<br/>chartEstablished<br/>bubble new vs old]\n```\n\n## Priority scoring\n\n```mermaid\nflowchart TD\n    P[product_type candidate] --> S1{sewable?}\n    S1 -->|no| X[[Lo\u1ea1i]]\n    S1 -->|yes| S2{hot_rate \u2265 50%?}\n    S2 -->|no| W[Watchlist]\n    S2 -->|yes| S3{avg_price $30\u2013$130?}\n    S3 -->|no| W\n    S3 -->|yes| S4{avg_review \u2265 200?}\n    S4 -->|no| Consider[Consider]\n    S4 -->|yes| Prio[[Priority \u2b50]]\n```\n\n## Schema ch\u1ea1m t\u1edbi\n\n| B\u1ea3ng | Vai tr\u00f2 |\n|---|---|\n| `market_listing` | ngu\u1ed3n duy nh\u1ea5t cho Research Hub |\n\n### C\u1ed9t `market_listing` \u0111\u01b0\u1ee3c d\u00f9ng\n\n| C\u1ed9t | D\u00f9ng cho chart |\n|---|---|\n| `product_type`, `category` | Ph\u00e2n nh\u00f3m |\n| `title` | Hi\u1ec3n th\u1ecb top listing |\n| `price`, `original_price`, `discount` | Price range / discount |\n| `rating`, `review_count` | Emerging vs established |\n| `badge`, `etsy_best`, `is_ad` | Hot rate |\n| `shop_name` | Li\u1ec7t k\u00ea top shop |\n| `crawled_at` | X\u00e1c \u0111\u1ecbnh batch crawl n\u00e0o m\u1edbi nh\u1ea5t |\n" },
  { label: "Flow 06 \u2014 Listings CRUD", group: "flows", content: "# Flow 06 \u2014 Listings CRUD\n\nFeature: qu\u1ea3n l\u00fd catalog n\u1ed9i b\u1ed9 (`listings`) v\u00e0 l\u01b0u output AI optimization (`optimized_title` / `optimized_tags` / `optimized_description`).\nUI: (ch\u01b0a g\u1eafn v\u00e0o index.html \u2014 endpoint d\u00f9ng cho backfill & Listing Manager t\u01b0\u01a1ng lai).\n\n## Sequence \u2014 c\u00e1c thao t\u00e1c CRUD\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor U as User / Backfill script\n    participant FE as Frontend / curl\n    participant API as /api/v1/listings\n    participant SVC as listing_service\n    participant DB as Postgres (listings)\n\n    rect rgb(240,245,255)\n    Note over U,DB: READ\n    U->>API: GET /listings?store=X&status=Open\n    API->>SVC: get_listings(db, skip, limit, store, status)\n    SVC->>DB: SELECT * FROM listings<br/>WHERE store=:s AND trang_thai=:t<br/>OFFSET skip LIMIT limit\n    DB-->>API: rows\n    API-->>U: listings[]\n    end\n\n    rect rgb(240,255,245)\n    Note over U,DB: CREATE\n    U->>API: POST /listings (ListingCreate)\n    API->>SVC: create_listing(db, data)\n    SVC->>DB: INSERT INTO listings (...)\n    DB-->>API: new row\n    API-->>U: listing (id = UUID)\n    end\n\n    rect rgb(255,250,235)\n    Note over U,DB: UPDATE\n    U->>API: PATCH /listings/{id} (ListingUpdate)\n    API->>SVC: update_listing(db, id, data)\n    SVC->>DB: UPDATE listings SET ...<br/>WHERE id = :id\n    DB-->>API: updated row\n    API-->>U: listing\n    end\n\n    rect rgb(255,240,240)\n    Note over U,DB: DELETE\n    U->>API: DELETE /listings/{id}\n    API->>SVC: delete_listing(db, id)\n    SVC->>DB: DELETE FROM listings<br/>WHERE id = :id\n    DB-->>API: rowcount\n    API-->>U: {ok: true}\n    end\n```\n\n## Sequence \u2014 AI optimization save\n\n```mermaid\nsequenceDiagram\n    autonumber\n    actor Sys as Optimizer<br/>(sklearn/Claude)\n    participant SVC as listing_service\n    participant DB as listings\n\n    Sys->>SVC: save_optimizations(<br/>listing_id, title, tags, desc)\n    SVC->>DB: UPDATE listings SET<br/>optimized_title = :t,<br/>optimized_tags = :g,<br/>optimized_description = :d,<br/>updated_at = now()<br/>WHERE id = :listing_id\n    DB-->>SVC: updated row\n    SVC-->>Sys: listing\n```\n\n## Routes\n\n| Method | Path | Handler | Schema |\n|---|---|---|---|\n| GET | `/api/v1/listings/` | `list_listings` | query: `skip`, `limit`, `store`, `status` |\n| GET | `/api/v1/listings/{listing_id}` | `get_listing` |   |\n| POST | `/api/v1/listings/` | `create_listing` | body: `ListingCreate` |\n| PATCH | `/api/v1/listings/{listing_id}` | `update_listing` | body: `ListingUpdate` |\n| DELETE | `/api/v1/listings/{listing_id}` | `delete_listing` |   |\n| GET | `/api/v1/listings/stats/count` | `listing_count` |   |\n\n## Quan h\u1ec7 v\u1edbi c\u00e1c feature kh\u00e1c\n\n```mermaid\nflowchart LR\n    L[listings] -- \"listing_id (logical)\" --> LR[listing_report]\n    L -- \"listing_id (logical)\" --> KR[keyword_report]\n    L -- \"input cho AI optimize\" --> OPT[Optimizer<br/>(sklearn/Claude)]\n    OPT -- \"save_optimizations()\" --> L\n    CSV[data/raw/<br/>production_file_listing.csv] -- \"seed ban \u0111\u1ea7u\" --> L\n```\n\n## Schema ch\u1ea1m t\u1edbi\n\n- `listings` \u2014 b\u1ea3ng duy nh\u1ea5t\n- (logical) `listing_report` / `keyword_report` \u2014 \u0111\u1ecdc/ghi qua feature kh\u00e1c, kh\u00f4ng thu\u1ed9c CRUD n\u00e0y\n\n## Ghi ch\u00fa v\u1eadn h\u00e0nh\n\n- `id` l\u00e0 UUID v4, sinh \u1edf t\u1ea7ng model (`default=lambda: str(uuid.uuid4())`).\n- Index: `idea_sku`, `store`, `trang_thai` \u2014 \u0111\u1ea3m b\u1ea3o query filter b\u1eb1ng 3 c\u1ed9t n\u00e0y nhanh.\n- `updated_at` t\u1ef1 c\u1eadp nh\u1eadt qua `onupdate=func.now()`.\n- Khi g\u1ecdi `save_optimizations`, kh\u00f4ng ghi \u0111\u00e8 tr\u01b0\u1eddng g\u1ed1c (`title`, `tag`, `description`) \u2014 ch\u1ec9 set c\u00e1c c\u1ed9t `optimized_*` \u0111\u1ec3 gi\u1eef reversible.\n" },
  { label: "Performance Hub Rules", group: "rules", content: "# Performance Hub \u2014 Quy chu\u1ea9n thi\u1ebft k\u1ebf & ph\u00e2n t\u00edch\n\n> \u00c1p d\u1ee5ng cho m\u1ecdi task li\u00ean quan \u0111\u1ebfn tab **Performance Hub** trong `index.html`.  \n> File n\u00e0y l\u00e0 ngu\u1ed3n s\u1ef1 th\u1eadt duy nh\u1ea5t \u2014 \u0111\u1ecdc tr\u01b0\u1edbc khi th\u1ef1c hi\u1ec7n b\u1ea5t k\u1ef3 thay \u0111\u1ed5i n\u00e0o.\n\n---\n\n## 1. M\u1ee5c ti\u00eau\n\nPerformance Hub d\u00f9ng \u0111\u1ec3 **nh\u00ecn l\u1ea1i k\u1ebft qu\u1ea3 \u0111\u00e3 th\u1ef1c hi\u1ec7n v\u00e0 x\u00e1c \u0111\u1ecbnh \u0111i\u1ec3m c\u1ea3i thi\u1ec7n**, t\u1eeb g\u00f3c nh\u00ecn s\u1ea3n ph\u1ea9m v\u00e0 listing c\u1ee5 th\u1ec3.\n\n**3 ch\u1ec9 s\u1ed1 tr\u1ecdng t\u00e2m**: CTR \u00b7 CR \u00b7 ROAS  \nM\u1ecdi section kh\u00e1c (portfolio, market gap) l\u00e0 ng\u1eef c\u1ea3nh ph\u1ee5 h\u1ed7 tr\u1ee3 ra quy\u1ebft \u0111\u1ecbnh.\n\n---\n\n## 2. C\u1ea5u tr\u00fac c\u1ed1 \u0111\u1ecbnh (kh\u00f4ng thay \u0111\u1ed5i th\u1ee9 t\u1ef1)\n\n```\n01 \u2014 T\u1ed5ng quan hi\u1ec7u qu\u1ea3          (hero KPI cards: CTR \u00b7 CR \u00b7 ROAS)\n02 \u2014 Listing t\u1ed1t nh\u1ea5t & quick win (best performers + CR-good/CTR-bad)\n03 \u2014 Chi ti\u1ebft theo s\u1ea3n ph\u1ea9m       (bar charts + stacked pass/fail)\n04 \u2014 B\u1ed1i c\u1ea3nh th\u1ecb tr\u01b0\u1eddng          (gap chart + portfolio \u2014 secondary)\n05 \u2014 H\u00e0nh \u0111\u1ed9ng \u01b0u ti\u00ean            (b\u1ea3ng action, impact, l\u00fd do)\n```\n\n---\n\n## 3. Ng\u01b0\u1ee1ng ch\u1ec9 s\u1ed1\n\n| Ch\u1ec9 s\u1ed1 | Ng\u01b0\u1ee1ng hi\u1ec7n t\u1ea1i | Ghi ch\u00fa |\n|---|---|---|\n| CTR | \u2265 2% | Listing thu h\u00fat click trong feed |\n| CR  | \u2265 4% | Listing thuy\u1ebft ph\u1ee5c buyer sau khi v\u00e0o |\n| ROAS | \u2265 break-even | Break-even ch\u01b0a x\u00e1c \u0111\u1ecbnh theo t\u1eebng s\u1ea3n ph\u1ea9m \u2014 d\u00f9ng 2.0x t\u1ea1m |\n\n**Rule:** Khi user cung c\u1ea5p break-even ROAS th\u1ef1c t\u1ebf, c\u1eadp nh\u1eadt threshold line `perfROAS` v\u00e0 t\u1ea5t c\u1ea3 s\u1ed1 li\u1ec7u pass/fail li\u00ean quan.\n\n---\n\n## 4. Section 01 \u2014 Hero KPI cards\n\nM\u1ed7i ch\u1ec9 s\u1ed1 = 1 card g\u1ed3m:\n- Avg value (l\u1edbn, serif font)\n- Pass count (N/128)\n- Progress bar (t\u1ef7 l\u1ec7 % listings \u0111\u1ea1t)\n- 1 c\u00e2u insight c\u1ee5 th\u1ec3 nh\u1ea5t (v\u00ed d\u1ee5: s\u1ea3n ph\u1ea9m n\u00e0o c\u00f3 v\u1ea5n \u0111\u1ec1 g\u00ec)\n- Border-left m\u00e0u ph\u00e2n bi\u1ec7t: \u0111\u1ecf (#b53333) = critical fail, xanh (#4a8c60) = ok, stone = neutral\n\n---\n\n## 5. Section 02 \u2014 Listing t\u1ed1t nh\u1ea5t & quick win\n\n**Lu\u00f4n hi\u1ec3n th\u1ecb 2 b\u1ea3ng song song:**\n\n### B\u1ea3ng tr\u00e1i \u2014 Best performers\n- \u0110i\u1ec1u ki\u1ec7n: CTR \u2265 2 AND CR \u2265 4 AND ROAS \u2265 2\n- S\u1eafp x\u1ebfp: composite score cao xu\u1ed1ng th\u1ea5p\n- D\u00f9ng l\u00e0m template \u0111\u1ec3 nh\u00e2n b\u1ea3n sang listing kh\u00e1c\n\n### B\u1ea3ng ph\u1ea3i \u2014 Quick win\n- \u0110i\u1ec1u ki\u1ec7n: CR \u2265 4 AND CTR < 2\n- L\u00fd do \u01b0u ti\u00ean: buyer mu\u1ed1n mua (CR ok) nh\u01b0ng kh\u00f4ng click v\u00e0o (CTR fail) \u2192 ch\u1ec9 c\u1ea7n fix thumbnail/title\n- S\u1eafp x\u1ebfp: CR DESC, CTR ASC (CR cao nh\u1ea5t + CTR th\u1ea5p nh\u1ea5t = d\u1ec5 c\u1ea3i thi\u1ec7n nh\u1ea5t)\n\n```sql\n-- Best performers\nSELECT listing_id, title, product, ctr, cr, roas\nFROM internal_listing\nWHERE ctr >= 2 AND cr >= 4 AND roas >= 2\nORDER BY (ctr/2 + cr/4 + roas/2) DESC LIMIT 8;\n\n-- Quick win\nSELECT listing_id, title, product, ctr, cr, roas\nFROM internal_listing\nWHERE cr >= 4 AND ctr < 2\nORDER BY cr DESC, ctr ASC LIMIT 8;\n```\n\n---\n\n## 6. Section 03 \u2014 Charts chi ti\u1ebft theo s\u1ea3n ph\u1ea9m\n\n- **Bar charts**: 1 bar per s\u1ea3n ph\u1ea9m, c\u00f3 **threshold line dashed** (d\u00f9ng mixed chart: bar + line)\n- **Stacked bar**: xanh (#4a8c60) = pass, \u0111\u1ecf (#b53333) = fail \u2014 per s\u1ea3n ph\u1ea9m\n- Canvas IDs c\u1ed1 \u0111\u1ecbnh: `perfCTR`, `perfCR`, `perfROAS`, `perfCTRStack`, `perfCRStack`\n- Kh\u1edfi t\u1ea1o trong `initPerfCharts()` \u2014 ch\u1ea1y `requestAnimationFrame(initPerfCharts)` on load\n\n---\n\n## 7. Section 04 \u2014 Market context (secondary)\n\n- Ch\u1ec9 2 chart nh\u1ecf: gap chart (`perfChartGap`) + portfolio donut (`perfChartPortfolio`)\n- Kh\u00f4ng c\u00f3 canvas `perfChartCount` \u2014 \u0111\u00e3 b\u1ecb x\u00f3a, kh\u00f4ng th\u00eam l\u1ea1i\n- Insight t\u1eadp trung v\u00e0o under/over-indexed so v\u1edbi market hot rate\n\n---\n\n## 8. Section 05 \u2014 B\u1ea3ng h\u00e0nh \u0111\u1ed9ng\n\nC\u1ed9t c\u1ed1 \u0111\u1ecbnh: `#` \u00b7 `H\u00e0nh \u0111\u1ed9ng` \u00b7 `S\u1ea3n ph\u1ea9m` \u00b7 `Impact` \u00b7 `L\u00fd do`  \nS\u1eafp x\u1ebfp: quick win tr\u01b0\u1edbc, chi\u1ebfn l\u01b0\u1ee3c sau, c\u1ea7n d\u1eef li\u1ec7u cu\u1ed1i\n\n---\n\n## 9. Ngu\u1ed3n d\u1eef li\u1ec7u\n\n- B\u1ea3ng: `internal_listing` (Neon PostgreSQL)\n- Snapshot hi\u1ec7n t\u1ea1i: 128 listings, 3 s\u1ea3n ph\u1ea9m, t\u1ea5t c\u1ea3 Closed\n- CTR/CR/ROAS: \u0111\u00e3 populate trong DB \u2014 tham chi\u1ebfu range th\u1ef1c t\u1eeb screenshot Etsy Ads\n- Ghi r\u00f5 ng\u00e0y snapshot trong subtitle header section\n\n---\n\n## 10. Snapshot 2026-04-16\n\n| S\u1ea3n ph\u1ea9m | n | CTR avg | CTR pass | CR avg | CR pass | ROAS avg | ROAS pass |\n|---|---|---|---|---|---|---|---|\n| baby blanket | 56 | 1.41% | 0/56 | 4.28% | 29/56 | 1.88x | 24/56 |\n| baby onesie | 42 | 1.75% | 11/42 | 3.75% | 18/42 | 1.22x | 0/42 |\n| baby romper | 30 | 1.71% | 9/30 | 4.53% | 18/30 | 1.64x | 8/30 |\n| **TOTAL** | **128** | **1.59%** | **20/128** | **4.16%** | **65/128** | **1.61x** | **32/128** |\n\nAll 3 pass: **3 listings** (t\u1ea5t c\u1ea3 baby romper)  \nAll 3 fail: **41 listings**  \nQuick win (CR ok, CTR bad): **54 listings**\n\n---\n\n*C\u1eadp nh\u1eadt l\u1ea7n cu\u1ed1i: 2026-04-16*\n" },
  { label: "Research Hub Rules", group: "rules", content: "# Research Hub \u2014 Quy chu\u1ea9n ph\u00e2n t\u00edch & \u0111\u1ec1 xu\u1ea5t s\u1ea3n ph\u1ea9m\n\n> \u00c1p d\u1ee5ng cho m\u1ecdi task li\u00ean quan \u0111\u1ebfn tab **Research Hub** trong `index.html`.  \n> File n\u00e0y l\u00e0 ngu\u1ed3n s\u1ef1 th\u1eadt duy nh\u1ea5t \u2014 \u0111\u1ecdc tr\u01b0\u1edbc khi th\u1ef1c hi\u1ec7n b\u1ea5t k\u1ef3 thay \u0111\u1ed5i n\u00e0o.\n\n---\n\n## 1. B\u1ed1i c\u1ea3nh kinh doanh\n\n**User l\u00e0 c\u00f4ng ty gia c\u00f4ng may th\u00eau.**  \nN\u0103ng l\u1ef1c c\u1ed1t l\u00f5i: may, th\u00eau, in v\u1ea3i \u2014 kh\u00f4ng s\u1ea3n xu\u1ea5t \u0111\u1ed3 g\u1ed7, g\u1ed1m s\u1ee9, \u0111i\u1ec7n t\u1eed, hay gi\u1ea5y in.\n\nTo\u00e0n b\u1ed9 ph\u00e2n t\u00edch v\u00e0 \u0111\u1ec1 xu\u1ea5t trong Research Hub **ph\u1ea3i ph\u1ea3n \u00e1nh g\u00f3c nh\u00ecn c\u1ee7a m\u1ed9t x\u01b0\u1edfng may**, kh\u00f4ng ph\u1ea3i g\u00f3c nh\u00ecn c\u1ee7a nh\u00e0 b\u00e1n l\u1ebb t\u1ed5ng qu\u00e1t.\n\n---\n\n## 2. Ph\u00e2n lo\u1ea1i s\u1ea3n ph\u1ea9m\n\n### 2a. S\u1ea3n ph\u1ea9m \u0110\u1ee6 \u0110I\u1ec0U KI\u1ec6N (may/th\u00eau \u0111\u01b0\u1ee3c)\n\nS\u1ea3n ph\u1ea9m \u0111\u01b0\u1ee3c coi l\u00e0 ph\u00f9 h\u1ee3p n\u1ebfu ch\u1ea5t li\u1ec7u ch\u00ednh l\u00e0 **v\u1ea3i, s\u1ee3i, len, denim, ho\u1eb7c c\u00f3 th\u1ec3 th\u00eau trang tr\u00ed**.\n\n| Nh\u00f3m | V\u00ed d\u1ee5 s\u1ea3n ph\u1ea9m t\u1eeb market_listing |\n|---|---|\n| May m\u1eb7c tr\u1ebb em | baby romper, baby bodysuit, baby onesie, baby sweater, denim jacket, baby shoes |\n| Ch\u0103n / kh\u0103n v\u1ea3i | baby blanket, milestone blanket, woven blanket |\n| Album / s\u00e1ch b\u1ecdc v\u1ea3i | photo album (v\u1ea3i), keepsake album, embroidered album |\n| G\u1ed1i / ph\u1ee5 ki\u1ec7n v\u1ea3i | name pillow |\n| Gi\u1ecf / t\u00fai v\u1ea3i | diaper caddy basket, storage basket, handmade basket, baby hamper |\n| S\u1ea3n ph\u1ea9m th\u00eau chuy\u00ean bi\u1ec7t | embroidery hoop, embroidered birth announcement |\n| \u0110\u1ed3 ch\u01a1i v\u1ea3i | plush toy, teddy bear |\n\n### 2b. S\u1ea3n ph\u1ea9m KH\u00d4NG PH\u00d9 H\u1ee2P\n\nKh\u00f4ng \u0111\u1ec1 xu\u1ea5t, kh\u00f4ng \u01b0u ti\u00ean trong b\u1ea3ng recommendation:\n\n| L\u00fd do | S\u1ea3n ph\u1ea9m |\n|---|---|\n| G\u1ed1m / \u0111\u1ea5t nung | jewelry dish, ring dish, trinket dish |\n| G\u1ed7 / acrylic | name sign, keepsake plaque, birth announcement sign, wooden puzzle, birth stats sign |\n| \u0110i\u1ec7n t\u1eed | night light, musical carousel, crystal ball lamp, ballerina night light |\n| Gi\u1ea5y / in \u1ea5n | birth stats print, star map print, storybook |\n| Kim lo\u1ea1i | baptism pin, keychain |\n| H\u1ed9p c\u1ee9ng | time capsule box, tooth fairy box |\n\n> **L\u01b0u \u00fd:** M\u1ed9t s\u1ed1 s\u1ea3n ph\u1ea9m nh\u01b0 `baby book`, `baby gift set`, `gift box` c\u00f3 th\u1ec3 c\u00f3 th\u00e0nh ph\u1ea7n v\u1ea3i \u2014 ch\u1ec9 \u0111\u01b0a v\u00e0o danh s\u00e1ch ph\u00f9 h\u1ee3p n\u1ebfu c\u00f3 b\u1eb1ng ch\u1ee9ng t\u1eeb title ho\u1eb7c data cho th\u1ea5y y\u1ebfu t\u1ed1 v\u1ea3i chi\u1ebfm ch\u00ednh.\n\n---\n\n## 3. Quy t\u1eafc ph\u00e2n t\u00edch trong Research Hub\n\n### 3a. B\u1ea3ng \u0111\u1ec1 xu\u1ea5t s\u1ea3n ph\u1ea9m (Section 05)\n- **Ch\u1ec9 hi\u1ec3n th\u1ecb s\u1ea3n ph\u1ea9m may/th\u00eau \u0111\u01b0\u1ee3c** trong b\u1ea3ng \u0111\u1ec1 xu\u1ea5t ch\u00ednh.\n- M\u1ed7i row ph\u1ea3i c\u00f3 c\u1ed9t ho\u1eb7c indicator \"Kh\u1ea3 n\u0103ng gia c\u00f4ng\" (th\u00eau, may, in v\u1ea3i...).\n- S\u1ea3n ph\u1ea9m kh\u00f4ng may \u0111\u01b0\u1ee3c \u2192 lo\u1ea1i kh\u1ecfi b\u1ea3ng ho\u1eb7c \u0111\u00e1nh d\u1ea5u r\u00f5 l\u00e0 ngo\u00e0i n\u0103ng l\u1ef1c.\n\n### 3b. Charts th\u1ecb ph\u1ea7n & hot rate\n- Khi t\u00f4 m\u00e0u ho\u1eb7c highlight chart, \u01b0u ti\u00ean **l\u00e0m n\u1ed5i b\u1eadt s\u1ea3n ph\u1ea9m may/th\u00eau \u0111\u01b0\u1ee3c**.\n- S\u1ea3n ph\u1ea9m kh\u00f4ng ph\u00f9 h\u1ee3p (jewelry dish, ring dish...) v\u1eabn hi\u1ec3n th\u1ecb \u0111\u1ec3 context c\u1ea1nh tranh, nh\u01b0ng **kh\u00f4ng \u0111\u01b0\u1ee3c \u0111\u1eb7t \u1edf v\u1ecb tr\u00ed \u01b0u ti\u00ean** trong narrative.\n\n### 3c. Insight t\u1ef1 \u0111\u1ed9ng / caption d\u01b0\u1edbi chart\n- Khi \u0111\u1ec1 c\u1eadp \"s\u1ea3n ph\u1ea9m \u0111ang hot\" \u2192 lu\u00f4n th\u00eam filter ng\u1ea7m: trong s\u1ed1 c\u00e1c s\u1ea3n ph\u1ea9m may \u0111\u01b0\u1ee3c, c\u00e1i n\u00e0o hot nh\u1ea5t?\n- V\u00ed d\u1ee5 \u0111\u00fang: *\"Trong c\u00e1c s\u1ea3n ph\u1ea9m may th\u00eau, baby romper d\u1eabn \u0111\u1ea7u v\u1edbi hot rate 71% v\u00e0 avg $58.\"*\n- V\u00ed d\u1ee5 sai: *\"Jewelry dish d\u1eabn \u0111\u1ea7u v\u1edbi 9 badges.\"* (kh\u00f4ng ph\u00f9 h\u1ee3p v\u1edbi n\u0103ng l\u1ef1c gia c\u00f4ng)\n\n### 3d. T\u00edn hi\u1ec7u \u01b0u ti\u00ean khi \u0111\u1ec1 xu\u1ea5t s\u1ea3n ph\u1ea9m m\u1edbi\nX\u1ebfp h\u1ea1ng \u01b0u ti\u00ean khi ch\u1ecdn s\u1ea3n ph\u1ea9m n\u00ean s\u1ea3n xu\u1ea5t:\n\n1. **Sewable = true** \u2014 \u0111i\u1ec1u ki\u1ec7n b\u1eaft bu\u1ed9c\n2. **Hot rate cao** (Popular now + Bestseller / t\u1ed5ng listing) \u2014 t\u00edn hi\u1ec7u nhu c\u1ea7u ng\u1eafn h\u1ea1n\n3. **Badge count tuy\u1ec7t \u0111\u1ed1i cao** \u2014 t\u00edn hi\u1ec7u platform \u0111ang \u0111\u1ea9y m\u1ea1nh\n4. **Avg price h\u1ee3p l\u00fd** \u2014 $30\u2013$130 l\u00e0 v\u00f9ng t\u1ed1i \u01b0u cho gia c\u00f4ng may th\u00eau\n5. **Emerging** (rating cao, review th\u1ea5p) \u2014 c\u01a1 h\u1ed9i gia nh\u1eadp tr\u01b0\u1edbc khi th\u1ecb tr\u01b0\u1eddng b\u00e3o ho\u00e0\n6. **Avg review \u0111\u1ee7 l\u1edbn** (>200) \u2014 x\u00e1c nh\u1eadn demand th\u1eadt s\u1ef1 t\u1ed3n t\u1ea1i\n\n---\n\n## 4. Danh s\u00e1ch s\u1ea3n ph\u1ea9m may/th\u00eau t\u1eeb market_listing (tham chi\u1ebfu nhanh)\n\n\u0110\u01b0\u1ee3c x\u00e1c \u0111\u1ecbnh t\u1eeb snapshot 2026-04-15, 180 listings:\n\n| S\u1ea3n ph\u1ea9m | Listings | Hot rate | Avg price | \u01afu ti\u00ea   { label: "Plan \u2014 Internal Ads Pipeline", group: "rules", content: "# Plan: Internal Ads Data Pipeline\n\n> Feature: Upload Etsy Ads screenshots -> Extract -> Review -> Import DB\n> Date: 2026-04-18\n> Status: DRAFT - pending review\n\n---\n\n## 1. Data Flow\n\n```\nUser ch\u1ee5p Etsy Ads dashboard (m\u1ed7i ~7 ng\u00e0y)\n        |\n        v\n[index.html] Drag & Drop \u1ea3nh v\u00e0o upload zone\n        |\n        v\nPOST /api/v1/internal/upload\n  -> L\u01b0u \u1ea3nh v\u00e0o data/raw/internal/{batch_id}/\n  -> T\u1ea1o record trong import_batch (status=uploaded)\n  -> Return batch_id\n        |\n        v\nPOST /api/v1/internal/extract   {batch_id}\n  -> Gemini Vision \u0111\u1ecdc t\u1eebng \u1ea3nh\n  -> Ph\u00e2n lo\u1ea1i: listing_summary | keyword_table\n  -> Merge data theo listing_id\n  -> L\u01b0u 2 JSON v\u00e0o data/raw/internal/{batch_id}/\n  -> Update import_batch (status=extracted)\n  -> Return {listing_report: [...], keyword_report: [...]}\n        |\n        v\n[index.html] Hi\u1ec7n preview 2 b\u1ea3ng (editable)\n  -> User ki\u1ec3m tra s\u1ed1, s\u1eeda n\u1ebfu c\u1ea7n\n        |\n        v\nPOST /api/v1/internal/confirm   {batch_id, listing_report, keyword_report}\n  -> Xo\u00e1 data c\u0169 trong DB c\u00f9ng listing_id + period\n  -> Insert data m\u1edbi t\u1eeb payload (\u0111\u00e3 qua user review)\n  -> L\u01b0u snapshot JSON v\u00e0o data/processed/snapshots/{batch_id}.json\n  -> Xo\u00e1 \u1ea3nh raw trong data/raw/internal/{batch_id}/\n  -> Update import_batch (status=confirmed)\n  -> Return {imported: true, rows: {listing: N, keyword: M}}\n        |\n        v\n[index.html] Hi\u1ec7n \"Import th\u00e0nh c\u00f4ng\" + link xem history\n```\n\n### Discard flow (user th\u1ea5y data sai, kh\u00f4ng mu\u1ed1n import):\n```\nPOST /api/v1/internal/discard   {batch_id}\n  -> Xo\u00e1 \u1ea3nh raw trong data/raw/internal/{batch_id}/\n  -> Update import_batch (status=discarded)\n```\n\n### Rollback flow (\u0111\u00e3 confirm nh\u01b0ng ph\u00e1t hi\u1ec7n sai sau \u0111\u00f3):\n```\nPOST /api/v1/internal/rollback   {batch_id}\n  -> \u0110\u1ecdc snapshot JSON t\u1eeb data/processed/snapshots/{batch_id}.json\n  -> Xo\u00e1 data batch \u0111\u00f3 trong DB (theo batch_id)\n  -> Update import_batch (status=rolled_back)\n  -> Snapshot gi\u1eef nguy\u00ean (kh\u00f4ng xo\u00e1)\n```\n\n---\n\n## 2. DB Schema (3 b\u1ea3ng m\u1edbi)\n\n### 2.1 import_batch \u2014 tracking m\u1ed7i l\u1ea7n upload\n\n```sql\nCREATE TABLE import_batch (\n    batch_id        VARCHAR(32) PRIMARY KEY,   -- format: YYYYMMDD_HHMM (e.g. \"20260418_1435\")\n    status          VARCHAR(16) NOT NULL,       -- uploaded | extracted | confirmed | discarded | rolled_back\n    file_count      INTEGER DEFAULT 0,          -- s\u1ed1 \u1ea3nh upload\n    listing_count   INTEGER DEFAULT 0,          -- s\u1ed1 listing extracted\n    keyword_count   INTEGER DEFAULT 0,          -- s\u1ed1 keyword extracted\n    created_at      TIMESTAMPTZ DEFAULT now(),\n    confirmed_at    TIMESTAMPTZ,                -- NULL cho t\u1edbi khi confirm\n    note            TEXT                        -- user ghi ch\u00fa (optional)\n);\n```\n\n### 2.2 listing_report \u2014 performance theo listing + period\n\n```sql\nCREATE TABLE listing_report (\n    id              SERIAL PRIMARY KEY,\n    batch_id        VARCHAR(32) NOT NULL REFERENCES import_batch(batch_id),\n    listing_id      VARCHAR(32) NOT NULL,       -- Etsy listing ID (e.g. \"4438217152\")\n    title           TEXT,\n    price           NUMERIC(10,2),\n    stock           INTEGER,\n    category        VARCHAR(64),\n    lifetime_orders INTEGER,\n    lifetime_revenue NUMERIC(12,2),\n    period          VARCHAR(32) NOT NULL,        -- \"Mar 19 - Apr 18\" ho\u1eb7c \"19/3/26\"\n    views           INTEGER DEFAULT 0,\n    clicks          INTEGER DEFAULT 0,\n    orders          INTEGER DEFAULT 0,\n    revenue         NUMERIC(12,2) DEFAULT 0,\n    spend           NUMERIC(12,2) DEFAULT 0,\n    roas            NUMERIC(8,2) DEFAULT 0,\n    created_at      TIMESTAMPTZ DEFAULT now()\n);\n\n-- Index cho query ph\u1ed5 bi\u1ebfn\nCREATE INDEX idx_lr_listing_period ON listing_report(listing_id, period);\nCREATE INDEX idx_lr_batch ON listing_report(batch_id);\n```\n\n### 2.3 keyword_report \u2014 performance theo keyword\n\n```sql\nCREATE TABLE keyword_report (\n    id              SERIAL PRIMARY KEY,\n    batch_id        VARCHAR(32) NOT NULL REFERENCES import_batch(batch_id),\n    listing_id      VARCHAR(32) NOT NULL,\n    keyword         TEXT NOT NULL,\n    period          VARCHAR(32) NOT NULL,\n    roas            NUMERIC(8,2) DEFAULT 0,\n    orders          INTEGER DEFAULT 0,\n    spend           NUMERIC(12,2) DEFAULT 0,\n    revenue         NUMERIC(12,2) DEFAULT 0,\n    clicks          INTEGER DEFAULT 0,\n    click_rate      VARCHAR(8),                  -- \"1.1%\" \u2014 gi\u1eef string v\u00ec UI c\u1ea7n hi\u1ec3n th\u1ecb %\n    views           INTEGER DEFAULT 0,\n    created_at      TIMESTAMPTZ DEFAULT now()\n);\n\nCREATE INDEX idx_kr_listing_period ON keyword_report(listing_id, period);\nCREATE INDEX idx_kr_batch ON keyword_report(batch_id);\n```\n\n### Quan h\u1ec7 gi\u1eefa 3 b\u1ea3ng\n\n```\nimport_batch (1) \u2500\u2500< listing_report (N)\nimport_batch (1) \u2500\u2500< keyword_report (N)\n```\n\n- `batch_id` l\u00e0 FK duy nh\u1ea5t, d\u00f9ng \u0111\u1ec3 rollback/delete theo batch\n- Kh\u00f4ng FK t\u1edbi b\u1ea3ng `listings` (v\u00ec listing_id \u1edf \u0111\u00e2y l\u00e0 Etsy ID string, kh\u00f4ng ph\u1ea3i UUID internal)\n\n---\n\n## 3. API Endpoints\n\n### \u0110\u1eb7t t\u1ea1i: `backend/app/api/routes/internal.py`\n### Prefix: `/api/v1/internal`\n\n| Method | Path | Input | Output | M\u00f4 t\u1ea3 |\n|--------|------|-------|--------|-------|\n| POST | `/upload` | `multipart/form-data` (files[]) | `{batch_id, file_count}` | Nh\u1eadn \u1ea3nh, l\u01b0u raw, t\u1ea1o batch |\n| POST | `/extract` | `{batch_id}` | `{listing_report: [], keyword_report: []}` | Gemini extract, return preview |\n| POST | `/confirm` | `{batch_id, listing_report: [], keyword_report: []}` | `{imported: true, rows: {...}}` | Import v\u00e0o DB, xo\u00e1 \u1ea3nh raw |\n| POST | `/discard` | `{batch_id}` | `{discarded: true}` | Hu\u1ef7 batch, xo\u00e1 \u1ea3nh raw |\n| POST | `/rollback` | `{batch_id}` | `{rolled_back: true}` | Revert DB, gi\u1eef snapshot |\n| GET | `/history` | `?limit=20` | `[{batch_id, status, counts, dates}]` | L\u1ecbch s\u1eed import |\n| GET | `/snapshot/{batch_id}` | \u2014 | `{listing_report: [], keyword_report: []}` | Xem l\u1ea1i data \u0111\u00e3 import |\n\n### Xo\u00e1 logic khi confirm:\n\n```python\n# Trong confirm endpoint:\n# 1. Xo\u00e1 records C\u0168 c\u00f9ng listing_id + period (tr\u00e1nh duplicate)\nawait session.execute(\n    delete(ListingReport).where(\n        ListingReport.listing_id.in_(listing_ids),\n        ListingReport.period.in_(periods),\n        ListingReport.batch_id != batch_id  # ch\u1ec9 xo\u00e1 batch c\u0169\n    )\n)\n# 2. T\u01b0\u01a1ng t\u1ef1 cho keyword_report\n# 3. Insert records m\u1edbi (t\u1eeb payload user \u0111\u00e3 review)\n# 4. L\u01b0u snapshot\n# 5. Xo\u00e1 \u1ea3nh raw\n```\n\n---\n\n## 4. Gemini Prompt \u2014 Internal Ads Screenshots\n\n### Kh\u00e1c bi\u1ec7t v\u1edbi market prompt hi\u1ec7n c\u00f3:\n\n| | Market (hi\u1ec7n c\u00f3) | Internal Ads (m\u1edbi) |\n|---|---|---|\n| Source | Etsy search results page | Etsy Ads dashboard |\n| Data | Product cards (title, price, rating...) | Performance metrics (views, clicks, ROAS...) |\n| Layout | Grid of product cards | Summary header + daily table OR keyword table |\n| Prompt file | `data/crawler/vision_extractor.py` | `backend/app/services/internal_extractor.py` (M\u1edaI) |\n\n### 4.1 Prompt cho Listing Performance screenshots\n\n```\nB\u1ea1n l\u00e0 AI chuy\u00ean \u0111\u1ecdc screenshot t\u1eeb Etsy Ads dashboard.\n\nScreenshot n\u00e0y l\u00e0 trang \"Listing advertising\" c\u1ee7a Etsy. H\u00e3 as (s\u1ed1 th\u1ef1c)\n   - orders (s\u1ed1 nguy\u00ean)\n   - spend (s\u1ed1 th\u1ef1c, b\u1ecf $)\n   - revenue (s\u1ed1 th\u1ef1c, b\u1ecf $)\n   - clicks (s\u1ed1 nguy\u00ean)\n   - click_rate (string gi\u1eef nguy\u00ean %, v\u00ed d\u1ee5 \"1.1%\")\n   - views (s\u1ed1 nguy\u00ean)\n\nTr\u1ea3 v\u1ec1 JSON:\n{\n  \"type\": \"keyword_table\",\n  \"listing_id\": \"4438225302\",\n  \"keywords\": [\n    {\"keyword\": \"custom sweatshirts\", \"roas\": 0, \"orders\": 0, \"spend\": 0.85, \"revenue\": 0, \"clicks\": 2, \"click_rate\": \"1.1%\", \"views\": 181}\n  ]\n}\n```\n\n### 4.3 Auto-classify\n\nBackend g\u1eedi \u1ea3nh k\u00e8m prompt ng\u1eafn \u0111\u1ec3 Gemini t\u1ef1 ph\u00e2n lo\u1ea1i:\n- N\u1ebfu th\u1ea5y daily breakdown \u2192 d\u00f9ng prompt 4.1\n- N\u1ebfu th\u1ea5y keyword table \u2192 d\u00f9ng prompt 4.2\n- Ho\u1eb7c: **1 prompt g\u1ed9p** v\u1edbi instruction \"if you see daily chart return type=listing_daily, if you see keyword rows return type=keyword_table\"\n\n### 4.4 Merge logic (backend)\n\n```python\n# Sau khi extract t\u1ea5t c\u1ea3 \u1ea3nh:\n# 1. Group listing_daily screenshots theo listing_id\n# 2. Summary l\u1ea5y t\u1eeb b\u1ea5t k\u1ef3 screenshot n\u00e0o (gi\u1ed1ng nhau)\n# 3. daily_data merge theo date:\n#    {\"19/3/26\": {\"views\": 68}} + {\"19/3/26\": {\"clicks\": 2}} \u2192 {\"19/3/26\": {\"views\": 68, \"clicks\": 2}}\n# 4. N\u1ebfu thi\u1ebfu metric cho 1 ng\u00e0y \u2192 gi\u1eef null (screenshot scroll kh\u00f4ng \u0111\u1ee7)\n# 5. keyword_table gi\u1eef nguy\u00ean, kh\u00f4ng merge\n```\n\n---\n\n## 5. Frontend UI\n\n### \u0110\u1eb7t t\u1ea1i: section m\u1edbi trong `index.html` (tab \"Internal Data\" ho\u1eb7c modal)\n\n### 5.1 Upload Zone\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25
