\")\nif batch_dir.exists():\n    shutil.rmtree(batch_dir)  # xo\u00e1 to\u00e0n b\u1ed9 folder \u1ea3nh\n```\n\n**L\u00fd do xo\u00e1:** \u1ea2nh ch\u1ec9 l\u00e0 input cho Gemini, sau confirm data \u0111\u00e3 n\u1eb1m trong DB + snapshot JSON. Gi\u1eef \u1ea3nh t\u1ed1n storage v\u00e0 kh\u00f4ng c\u1ea7n truy c\u1eadp l\u1ea1i.\n\n### 6.2 Xo\u00e1 data c\u0169 khi import tr\u00f9ng\n\n```python\n# Tr\u01b0\u1edbc khi insert batch m\u1edbi:\n# Xo\u00e1 records c\u00f3 c\u00f9ng (listing_id, period) t\u1eeb batch C\u0168\n# Gi\u1eef snapshot c\u1ee7a batch c\u0169 \u0111\u1ec3 rollback n\u1ebfu c\u1ea7n\n```\n\n### 6.3 Discard \u2014 hu\u1ef7 batch ch\u01b0a confirm\n\n```python\n# Xo\u00e1 \u1ea3nh raw + JSON preview\n# Mark batch status = discarded\n# Kh\u00f4ng \u1ea3nh h\u01b0\u1edfng DB\n```\n\n### 6.4 Rollback \u2014 revert batch \u0111\u00e3 confirm\n\n```python\n# 1. \u0110\u1ecdc snapshot JSON\n# 2. DELETE FROM listing_report WHERE batch_id = ?\n# 3. DELETE FROM keyword_report WHERE batch_id = ?\n# 4. Mark batch status = rolled_back\n# 5. Gi\u1eef nguy\u00ean snapshot (cho audit trail)\n```\n\n### 6.5 Auto-cleanup (optional, phase 2)\n\n- Snapshots > 90 ng\u00e0y: archive ho\u1eb7c xo\u00e1\n- Batches status=discarded > 7 ng\u00e0y: xo\u00e1 record kh\u1ecfi import_batch\n\n---\n\n## 7. File Structure (code m\u1edbi c\u1ea7n t\u1ea1o)\n\n```\nbackend/app/\n\u251c\u2500\u2500 api/routes/\n\u2502   \u2514\u2500\u2500 internal.py              \u2190 NEW: 7 endpoints\n\u251c\u2500\u2500 models/\n\u2502   \u251c\u2500\u2500 import_batch.py          \u2190 NEW: ImportBatch model\n\u2502   \u251c\u2500\u2500 listing_report.py        \u2190 NEW: ListingReport model\n\u2502   \u2514\u2500\u2500 keyword_report.py        \u2190 NEW: KeywordReport model\n\u251c\u2500\u2500 schemas/\n\u2502   \u2514\u2500\u2500 internal.py              \u2190 NEW: request/response schemas\n\u251c\u2500\u2500 services/\n\u2502   \u2514\u2500\u2500 internal_service.py      \u2190 NEW: business logic\n\u2502   \u2514\u2500\u2500 internal_extractor.py    \u2190 NEW: Gemini prompt + extract + merge\n```\n\n### S\u1eeda file c\u00f3 s\u1eb5n:\n\n| File | Thay \u0111\u1ed5i |\n|------|----------|\n| `backend/app/main.py` | Th\u00eam `include_router(internal_router)` |\n| `backend/app/core/config.py` | Th\u00eam `GEMINI_API_KEY` setting |\n| `backend/requirements.txt` | Th\u00eam `google-generativeai`, `Pillow`, `python-multipart` |\n| `index.html` | Th\u00eam Internal Data section/tab + JS upload/preview/confirm |\n| `.env.example` | Th\u00eam `GEMINI_API_KEY` |\n\n---\n\n## 8. Dependencies m\u1edbi\n\n```\n# backend/requirements.txt \u2014 th\u00eam:\ngoogle-generativeai>=0.8.0    # Gemini Vision API\nPillow>=10.0.0                # Image processing\npython-multipart>=0.0.9       # File upload support (FastAPI)\naiofiles>=24.1.0              # Async file operations\n```\n\n---\n\n## 9. Ph\u00e2n c\u00f4ng Agent\n\n| Phase | Agent | Scope | Output |\n|-------|-------|-------|--------|\n| 1 | **Backend** | Models + DB migration | 3 model files, alembic migration |\n| 2 | **Backend** | Schemas + Service | internal.py schemas, internal_service.py |\n| 3 | **Backend** | Gemini Extractor | internal_extractor.py (2 prompts + merge logic) |\n| 4 | **Backend** | API Routes | internal.py routes (7 endpoints) |\n| 5 | **Frontend** | UI Components | Upload zone, preview tables, history panel |\n| 6 | **Testing** | Integration test | Upload \u2192 Extract \u2192 Confirm \u2192 Rollback flow |\n\n### Th\u1ee9 t\u1ef1 ph\u1ee5 thu\u1ed9c:\n\n```\nPhase 1 (Models) \u2500\u2500> Phase 2 (Schemas+Service) \u2500\u2500> Phase 4 (Routes)\n                                                        |\nPhase 3 (Extractor) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                                        |\n                                                   Phase 5 (Frontend)\n                                                        |\n                                                   Phase 6 (Testing)\n```\n\n---\n\n## 10. Risks & Mitigations\n\n| Risk | Impact | Mitigation |\n|------|--------|------------|\n| Gemini \u0111\u1ecdc sai s\u1ed1 t\u1eeb screenshot | Data sai v\u00e0o DB | User review + editable cells tr\u01b0\u1edbc confirm |\n| Screenshot format thay \u0111\u1ed5i (Etsy update UI) | Extract fail | Prompt flexible, c\u00f3 fallback manual input |\n| Upload \u1ea3nh l\u1edbn (>5MB/file) | Slow, timeout | Resize client-side tr\u01b0\u1edbc upload, limit 20 files |\n| Confirm nh\u1ea7m, ph\u00e1t hi\u1ec7n sau | Data sai trong DB | Rollback mechanism + snapshot |\n| Tr\u00f9ng data (upload c\u00f9ng period 2 l\u1ea7n) | Duplicate rows | Upsert logic: xo\u00e1 c\u0169 c\u00f9ng listing+period tr\u01b0\u1edbc insert |\n| Gemini API rate limit | Extract fail gi\u1eefa ch\u1eebng | Retry with backoff, partial extract resume |\n\n---\n\n## 11. C\u00e2u h\u1ecfi m\u1edf (c\u1ea7n th\u1ea3o lu\u1eadn)\n\n1. **Daily rows**: C\u00f3 c\u1ea7n l\u01b0u daily breakdown (31 d\u00f2ng/listing) hay ch\u1ec9 c\u1ea7n 30-day summary + yesterday?\n   - N\u1ebfu ch\u1ec9 summary: \u0111\u01a1n gi\u1ea3n h\u01a1n, \u00edt \u1ea3nh h\u01a1n (ch\u1ec9 c\u1ea7n 1 \u1ea3nh/listing + 1 \u1ea3nh keyword)\n   - N\u1ebfu daily: c\u1ea7n 6 \u1ea3nh/listing (views, clicks, orders, revenue, spend, roas) + scroll \u0111\u1ee7\n\n2. **Listing metadata** (title, price, stock, category, lifetime): L\u1ea5y t\u1eeb \u0111\u00e2u?\n   - Kh\u00f4ng c\u00f3 trong Ads screenshot \u2014 c\u1ea7n screenshot ri\u00eang t\u1eeb listing page?\n   - Hay nh\u1eadp tay tr\u00ean UI?\n   - Hay pull t\u1eeb Etsy API (n\u1ebfu c\u00f3 API key)?\n\n3. **Multi-listing per batch**: M\u1ed7i l\u1ea7n upload c\u00f3 th\u1ec3 ch\u1ee9a \u1ea3nh t\u1eeb nhi\u1ec1u listing kh\u00f4ng?\n   - N\u1ebfu c\u00f3: c\u1ea7n Gemini ph\u00e2n lo\u1ea1i theo listing_id t\u1eeb URL\n\n4. **Period cho keyword_report**: Screenshot keyword kh\u00f4ng hi\u1ec7n period filter \u2192 assume c\u00f9ng period v\u1edbi listing screenshots c\u00f9ng batch?\n\n5. **T\u1ea7n su\u1ea5t**: 7 ng\u00e0y/l\u1ea7n, nh\u01b0ng period = 30 ng\u00e0y \u2192 data overlap 23 ng\u00e0y gi\u1eefa 2 l\u1ea7n import. C\u00f3 c\u1ea7n x\u1eed l\u00fd overlap hay ghi \u0111\u00e8?\n" },
  { label: "Technical Doc", group: "technical", content: "# TECHNICAL DOCUMENT \u2014 Etsy Listing Manager\n\n> Domain: `nguyenphamdieuhien.online`\n> M\u1ee5c \u0111\u00edch: t\u1ed5ng h\u1ee3p ki\u1ebfn tr\u00fac, data schemas v\u00e0 \u0111\u1eb7c t\u1ea3 t\u1eebng feature. S\u01a1 \u0111\u1ed3 lu\u1ed3ng c\u1ee7a m\u1ed7i feature n\u1eb1m trong th\u01b0 m\u1ee5c [flows/](flows/).\n\n---\n\n## 0. Ki\u1ebfn tr\u00fac t\u1ed5ng quan\n\n```\nFrontend (Vanilla HTML/CSS/JS)           Backend (FastAPI)              Storage\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500           \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nindex.html                   \u2500\u2500 fetch \u2500\u2500> /api/v1/listings              Postgres (Neon)\n  \u00b7 Performance Hub          \u2500\u2500 fetch \u2500\u2500> /api/v1/performance             \u00b7 listings\n  \u00b7 Research Hub             \u2500\u2500 fetch \u2500\u2500> /api/v1/internal                \u00b7 listing_report\n  \u00b7 Internal Import          \u2500\u2500 fetch \u2500\u2500> /api/v1/market                  \u00b7 keyword_report\n  \u00b7 Listings CRUD                                                         \u00b7 import_batch\n                                                                          \u00b7 market_listing\ndata/processed/                                                           \u00b7 scenarios_rules\n  performance_dashboard.json <\u2500\u2500 write \u2500\u2500 services/performance_service\ndata/raw/internal/{batch}/   <\u2500\u2500\u2500 rw \u2500\u2500\u2500\u2500 services/internal_service\ndata/processed/snapshots/    <\u2500\u2500 write \u2500\u2500 services/internal_service     External APIs\n                                                                          \u00b7 Claude Vision\ndata/crawler/output/         <\u2500\u2500 write \u2500\u2500 data/crawler/*                  \u00b7 Gemini Vision\n```\n\n### Th\u01b0 m\u1ee5c ch\u00ednh\n\n| Layer | Path | N\u1ed9i dung |\n|-------|------|----------|\n| Frontend | `index.html`, `frontend/` | UI, charts, fetch API |\n| Backend API | `backend/app/api/routes/` | Route handlers, FastAPI |\n| Service | `backend/app/services/` | Business logic |\n| Model | `backend/app/models/` | SQLAlchemy ORM |\n| Schema | `backend/app/schemas/` | Pydantic DTO |\n| Crawler | `data/crawler/` | Cron crawler \u2192 `market_listing` |\n| Data | `data/raw/`, `data/processed/` | Ngu\u1ed3n g\u1ed1c & output |\n\n### Env vars quan tr\u1ecdng\n\n| Bi\u1ebfn | M\u00f4 t\u1ea3 |\n|------|-------|\n| `DATABASE_URL` | Neon Postgres (async `postgresql+asyncpg://`) |\n| `ANTHROPIC_API_KEY` | Claude API (listing optimizer + vision) |\n| `CLAUDE_MODEL` | Model ID (default `claude-sonnet-4-6`) |\n| `GEMINI_API_KEY` | (tu\u1ef3 ch\u1ecdn) fallback vision |\n| `ALLOWED_ORIGINS` | CORS |\n\n---\n\n## 1. Data schemas\n\nT\u1ea5t c\u1ea3 b\u1ea3ng c\u00f9ng n\u1eb1m tr\u00ean Neon Postgres. Base = SQLAlchemy declarative (`backend/app/core/database.py`).\n\n### 1.1 `listings` \u2014 catalog n\u1ed9i b\u1ed9 (source of truth cho AI optimization)\n\n> Schema th\u1ef1c t\u1ebf tr\u00ean Neon (\u0111\u01b0\u1ee3c populate b\u1edfi ETL `data/crawler/etl_listings.py`).\n\n| Column | Type | Null | Index | Ghi ch\u00fa |\n|---|---|---|---|---|\n| `id` | `INTEGER` PK autoincrement | NO | PK | Sinh t\u1ef1 \u0111\u1ed9ng |\n| `listing_id` | `VARCHAR(32)` | NO | UNIQUE | ID listing tr\u00ean Etsy |\n| `title` | `TEXT` | YES |   | Ti\u00eau \u0111\u1ec1 listing |\n| `category` | `VARCHAR(64)` | YES |   | Danh m\u1ee5c s\u1ea3n ph\u1ea9m |\n| `no_vm` | `VARCHAR(16)` | YES |   | M\u00e3 VM c\u1ee7a importer |\n| `url` | `TEXT` | YES |   | URL Etsy (t\u1ef1 sinh t\u1eeb listing_id) |\n| `import_time` | `TIMESTAMPTZ` | YES |   | Th\u1eddi \u0111i\u1ec3m import g\u1ea7n nh\u1ea5t |\n| `importer` | `VARCHAR(64)` | YES |   | T\u00ean ng\u01b0\u1eddi/h\u1ec7 th\u1ed1ng import |\n\n**ETL logic** (`etl_listings.py`, ch\u1ea1y m\u1ed7i th\u1ee9 2 l\u00fac 07:00 UTC):\n- Ngu\u1ed3n: `listing_report` \u2014 l\u1ea5y **latest non-null value per field** (correlated subquery per column).\n- UPSERT: INSERT m\u1edbi n\u1ebfu `listing_id` ch\u01b0a c\u00f3; UPDATE n\u1ebfu \u0111\u00e3 c\u00f3 nh\u01b0ng field \u0111ang null (`COALESCE` \u2014 kh\u00f4ng bao gi\u1edd xo\u00e1 d\u1eef li\u1ec7u c\u00f3 s\u1eb5n).\n\n### 1.8 `references_engine` \u2014 top-3 market reference per internal listing\n\nPopulate **on-demand** qua endpoint `POST /api/v1/references/refresh` (service: [backend/app/services/references_service.py](../backend/app/services/references_service.py)). Kh\u00f4ng ch\u1ea1y trong cron ETL \u2014 user trigger khi c\u1ea7n.\n\n| Column | Type | Null | Ghi ch\u00fa |\n|---|---|---|---|\n| `listing_id` | `VARCHAR(32)` | NO | PK (composite), kh\u1edbp `listings.listing_id` |\n| `reference_listing_id` | `TEXT` | NO | PK (composite), kh\u1edbp `market_listing.id` |\n| `ref_rank` | `SMALLINT` | NO | 1..3 \u2014 th\u1ee9 t\u1ef1 \u01b0u ti\u00ean |\n| `ref_title` | `TEXT` | YES |   |\n| `ref_shop` | `TEXT` | YES |   |\n| `ref_url` | `TEXT` | YES |   |\n| `ref_price` | `INTEGER` | YES | cents |\n| `ref_rating` | `REAL` | YES | 0.0 \u2013 5.0 |\n| `ref_review_count` | `INTEGER` | YES |   |\n| `ref_tag_ranking` | `INTEGER` | YES | Th\u1ea5p h\u01a1n = xu\u1ea5t hi\u1ec7n s\u1edbm h\u01a1n trong search |\n| `ref_badge` | `TEXT` | YES | `Popular`, `Bestseller`\u2026 |\n| `match_method` | `VARCHAR(16)` | def `'category'` | C\u01a1 ch\u1ebf match (hi\u1ec7n ch\u1ec9 c\u00f3 `category`) |\n| `refreshed_at` | `TIMESTAMPTZ` | def `now()` |   |\n\n**Logic:**\n- Match: `ILIKE` \u2014 `listings.category` xu\u1ea5t hi\u1ec7n trong b\u1ea5t k\u1ef3 field n\u00e0o c\u1ee7a market_listing (`search_tag` / `product_type` / `title`).\n- Rank: `ORDER BY tag_ranking ASC NULLS LAST, review_count DESC NULLS LAST`, gi\u1eef top-N (default N=3).\n- UPSERT: ON CONFLICT (`listing_id`, `reference_listing_id`) DO UPDATE \u2014 refresh rank + fill null fields b\u1eb1ng COALESCE.\n\n**Endpoints** (`/api/v1/references`):\n\n| Method | Path | M\u00f4 t\u1ea3 |\n|---|---|---|\n| POST | `/refresh?top_n=3&listing_id=\u2026` | Trigger t\u00ednh l\u1ea1i. `listing_id` r\u1ed7ng = refresh t\u1ea5t c\u1ea3. Tr\u1ea3 stats (upserted, covered, total). |\n| GET  | `/` | List to\u00e0n b\u1ed9 references |\n| GET  | `/{listing_id}` | L\u1ea5y references c\u1ee7a 1 listing |\n\n**Future work**: th\u00eam `match_method='embedding'` d\u00f9ng `ListingEmbedder` khi c\u1ea7n match semantic thay v\u00ec category.\n\n### 1.2 `listing_report` \u2014 snapshot hi\u1ec7u su\u1ea5t theo listing \u00d7 period\n\nModel: [backend/app/models/listing_report.py](../backend/app/models/listing_report.py)\n\n| Column | Type | Null | Ghi ch\u00fa |\n|---|---|---|---|\n| `id` | `INTEGER` PK autoincrement | NO |   |\n| `listing_id` | `VARCHAR(32)` | NO | Kh\u1edbp v\u1edbi `listings.listing_id` (logical FK, kh\u00f4ng r\u00e0ng bu\u1ed9c) |\n| `title` | `TEXT` | YES |   |\n| `no_vm` | `VARCHAR(16)` | YES | M\u00e3 VM c\u1ee7a importer |\n| `price` | `NUMERIC(10,2)` | YES | $ |\n| `stock` | `INTEGER` | YES |   |\n| `category` | `VARCHAR(64)` | YES |   |\n| `lifetime_orders` | `INTEGER` | YES |   |\n| `lifetime_revenue` | `NUMERIC(12,2)` | YES | $ |\n| `period` | `VARCHAR(32)` | NO | \u0110\u1ecbnh d\u1ea1ng \"Mar 19 - Apr 18\" |\n| `views` | `INTEGER` | def 0 |   |\n| `clicks` | `INTEGER` | def 0 |   |\n| `orders` | `INTEGER` | def 0 |   |\n| `revenue` | `NUMERIC(12,2)` | def 0 |   |\n| `spend` | `NUMERIC(12,2)` | def 0 |   |\n| `roas` | `NUMERIC(8,2)` | def 0 | revenue/spend |\n| `import_time` | `TIMESTAMPTZ` | YES |   |\n| `importer` | `VARCHAR(64)` | YES | T\u00ean ng\u01b0\u1eddi import |\n\nKho\u00e1 t\u1ef1 nhi\u00ean: `(listing_id, period, no_vm)` \u2014 khi confirm import s\u1ebd `DELETE` theo kho\u00e1 n\u00e0y r\u1ed3i `INSERT` l\u1ea1i.\n\n### 1.3 `keyword_report` \u2014 hi\u1ec7u su\u1ea5t theo keyword \u00d7 listing \u00d7 period\n\nModel: [backend/app/models/keyword_report.py](../backend/app/models/keyword_report.py)\n\n| Column | Type | Null | Ghi ch\u00fa |\n|---|---|---|---|\n| `id` | `INTEGER` PK autoincrement | NO |   |\n| `listing_id` | `VARCHAR(32)` | NO |   |\n| `keyword` | `TEXT` | NO |   |\n| `no_vm` | `VARCHAR(16)` | YES |   |\n| `period` | `VARCHAR(32)` | NO |   |\n| `roas` | `NUMERIC(8,2)` | def 0 |   |\n| `orders` | `INTEGER` | def 0 |   |\n| `spend` | `NUMERIC(12,2)` | def 0 |   |\n| `revenue` | `NUMERIC(12,2)` | def 0 |   |\n| `clicks` | `INTEGER` | def 0 |   |\n| `click_rate` | `VARCHAR(8)` | YES | L\u01b0u d\u1ea1ng text \"1.1%\" |\n| `views` | `INTEGER` | def 0 |   |\n| `import_time` | `TIMESTAMPTZ` | YES |   |\n| `importer` | `VARCHAR(64)` | YES |   |\n\n### 1.4 `import_batch` \u2014 qu\u1ea3n l\u00fd batch Internal Ads Import\n\nModel: [backend/app/models/import_batch.py](../backend/app/models/import_batch.py)\n\n| Column | Type | Null | Ghi ch\u00fa |\n|---|---|---|---|\n| `batch_id` | `VARCHAR(32)` PK | NO | Format `YYYYMMDD_HHMM` |\n| `status` | `VARCHAR(16)` | NO | `uploaded` / `extracted` / `confirmed` / `discarded` / `rolled_back` |\n| `file_count` | `INTEGER` | def 0 |   |\n| `listing_count` | `INTEGER` | def 0 |   |\n| `keyword_count` | `INTEGER` | def 0 |   |\n| `progress` | `INTEGER` | def 0 | 0\u2013100 |\n| `total_files` | `INTEGER` | def 0 |   |\n| `created_at` | `TIMESTAMPTZ` | NO | `server_default=now()` |\n| `confirmed_at` | `TIMESTAMPTZ` | YES |   |\n| `note` | `TEXT` | YES |   |\n| `error_message` | `TEXT` | YES |   |\n\nState machine: `uploaded \u2192 extracted \u2192 (confirmed | discarded)`; `confirmed \u2192 rolled_back`.\n\n### 1.5 `market_listing` \u2014 d\u1eef li\u1ec7u crawl Etsy\n\nB\u1ea3ng \u0111\u01b0\u1ee3c t\u1ea1o th\u1ee7 c\u00f4ng tr\u00ean Neon (model Python \u0111\u00e3 drop \u2014 xem commit `df2e314`). Schema hi\u1ec7n h\u00e0nh:\n\n| Column | Type | Index | Ghi ch\u00fa |\n|---|---|---|---|\n| `id` | `INTEGER` PK autoincrement |   |   |\n| `batch_id` | `VARCHAR(64)` |   | Crawl batch |\n| `source_screenshot` | `VARCHAR(256)` |   | T\u00ean file \u1ea3nh ngu\u1ed3n |\n| `search_tag` | `VARCHAR(128)` | \u2705 | Keyword khi crawl |\n| `etsy_best` | `VARCHAR(32)` |   | Badge \"Etsy's Pick\"\u2026 |\n| `product_type` | `VARCHAR(128)` | \u2705 | V\u00ed d\u1ee5 `baby romper` |\n| `category` | `VARCHAR(128)` | \u2705 |   |\n| `title` | `TEXT` |   |   |\n| `price` | `INTEGER` |   | Gi\u00e1 hi\u1ec7n t\u1ea1i (cents) |\n| `original_price` | `INTEGER` |   | Gi\u00e1 g\u1ed1c (cents) |\n| `discount` | `INTEGER` |   | % |\n| `shop_name` | `VARCHAR(256)` |   |   |\n| `rating` | `NUMERIC(3,1)` |   | 0.0 \u2013 5.0 |\n| `review_count` | `INTEGER` |   |   |\n| `badge` | `VARCHAR(32)` |   | `Popular`\u2026 |\n| `is_ad` | `BOOLEAN` def F |   |   |\n| `free_shipping` | `BOOLEAN` def F |   |   |\n| `image_description` | `TEXT` |   | Alt / caption |\n| `scroll_position` | `INTEGER` |   |   |\n| `crawled_at` | `TIMESTAMPTZ` | def now |   |\n\nGhi ch\u00fa: code crawler hi\u1ec7n t\u1ea1i ghi qua CSV/JSON/SQLite local (`data/crawler/output/products.db`); b\u1ea3ng Postgres \u0111\u01b0\u1ee3c n\u1ea1p b\u1eb1ng migrate ngo\u00e0i lu\u1ed3ng crawler. Performance service query `market_listing` b\u1eb1ng LATERAL JOIN \u0111\u1ec3 t\u00ecm reference competitor.\n\n### 1.6 `scenarios_rules` \u2014 ma tr\u1eadn quy\u1ebft \u0111\u1ecbnh CTR \u00d7 CR \u00d7 ROAS\n\nModel: [backend/app/models/scenario.py](../backend/app/models/scenario.py)\n\n| Column | Type | Null | Ghi ch\u00fa |\n|---|---|---|---|\n| `id` | `INTEGER` PK autoincrement | NO |   |\n| `roas_band` | `VARCHAR(32)` | NO | `profitable` / `slight_loss` / `heavy_loss` / `no_sales` |\n| `cr_level` | `VARCHAR(8)` | NO | `high` / `low` / `zero` |\n| `ctr_level` | `VARCHAR(8)` | NO | `high` / `low` |\n| `case_name` | `TEXT` | NO | M\u00f4 t\u1ea3 ti\u1ebfng Vi\u1ec7t |\n| `action` | `VARCHAR(32)` | NO | `keep` / `improve` / `improve_or_off` |\n| `cause` | `TEXT` | YES | Root cause ti\u1ebfng Vi\u1ec7t |\n| `fix_listing` | `TEXT` | YES | G\u1ee3i \u00fd s\u1eeda listing |\n| `fix_ads` | `TEXT` | YES | G\u1ee3i \u00fd ch\u1ec9nh campaign |\n\nSeeded b\u1edfi `performance_service.seed_scenarios()` (16 rows). Ng\u01b0\u1ee1ng chu\u1ea9n: **CTR \u2265 1.5% = high**, **CR \u2265 3% = high**, **ROAS break-even = 2.0**.\n\n### 1.7 Quan h\u1ec7 logic\n\n```\nlistings.listing_id \u2500\u2500\u2510\n                      \u251c\u2500\u25ba listing_report.listing_id     (1-N theo period)\n                      \u2514\u2500\u25ba keyword_report.listing_id     (1-N theo keyword \u00d7 period)\n\nimport_batch.batch_id \u2500\u2500\u25ba listing_report (logical, d\u00f9ng period + importer \u0111\u1ec3 revert)\n                      \u2514\u2500\u25ba keyword_report\n\nlisting_report.(roas_band, cr_level, ctr_level)\n    \u2500\u2500\u25ba scenarios_rules.(roas_band, cr_level, ctr_level)  (N-1)\n\nlisting_report.category \u2500\u2500\u25ba market_listing.product_type  (LATERAL JOIN)\n```\n\nKh\u00f4ng c\u00f3 r\u00e0ng bu\u1ed9c FK c\u1ee9ng \u2014 join th\u1ef1c hi\u1ec7n \u1edf t\u1ea7ng SQL/service \u0111\u1ec3 d\u1ec5 import d\u1eef li\u1ec7u r\u1eddi r\u1ea1c.\n\n---\n\n## 2. Backend routes\n\n| Prefix | File | Route | Method | D\u00f9ng cho feature |\n|---|---|---|---|---|\n| `/api/v1/listings` | [listings.py](../backend/app/api/routes/listings.py) | `/` | GET/POST | Listings CRUD |\n|   |   | `/{listing_id}` | GET/PATCH/DELETE | Listings CRUD |\n|   |   | `/stats/count` | GET | Listings CRUD |\n| `/api/v1/performance` | [performance.py](../backend/app/api/routes/performance.py) | `/listings` | GET | Performance Hub |\n|   |   | `/refresh` | POST | Performance Hub |\n| `/api/v1/internal` | [internal.py](../backend/app/api/routes/internal.py) | `/upload` | POST | Internal Import |\n|   |   | `/extract` | POST | Internal Import |\n|   |   | `/confirm` | POST | Internal Import |\n|   |   | `/discard` | POST | Internal Import |\n|   |   | `/rollback` | POST | Internal Import |\n|   |   | `/history` | GET | Internal Import |\n|   |   | `/snapshot/{batch_id}` | GET | Internal Import |\n| `/api/v1/market` | [market.py](../backend/app/api/routes/market.py) | `/samples` | GET | Research Hub |\n| `/api/v1/references` | [references.py](../backend/app/api/routes/references.py) | `/refresh` | POST | On-demand sinh `references_engine` |\n|   |   | `/` | GET | List references |\n|   |   | `/{listing_id}` | GET | References c\u1ee7a 1 listing |\n\n---\n\n## 3. Feature specs\n\nM\u1ed7i feature c\u00f3 m\u1ed9t s\u01a1 \u0111\u1ed3 lu\u1ed3ng Mermaid trong [flows/](flows/).\n\n### 3.1 Performance Hub \u2014 Listing Performance (pill `perf-sub-performance`)\n- **M\u1ee5c ti\u00eau:** snapshot hi\u1ec7u su\u1ea5t listing theo 3 ch\u1ec9 s\u1ed1 CTR / CR / ROAS.\n- **Backend ngu\u1ed3n d\u1eef li\u1ec7u:** `listing_report` (aggregated theo listing m\u1edbi nh\u1ea5t) + `scenarios_rules` JOIN + `market_listing` LATERAL.\n- **Output:** Hero KPI, b\u1ea3ng Best Performers (CTR \u2265 2%, CR \u2265 4%, ROAS \u2265 2), Quick Win (CR \u2265 4%, CTR < 2%), chart gap & portfolio.\n- **Cache:** `data/processed/performance_dashboard.json`. Rebuild qua `POST /api/v1/performance/refresh`.\n- **Flow diagram:** [flows/01_performance_hub.md](flows/01_performance_hub.md).\n\n### 3.2 Performance Hub \u2014 Listing Improvement (pill `perf-sub-improvement`)\n- **M\u1ee5c ti\u00eau:** g\u1ee3i \u00fd h\u00e0nh \u0111\u1ed9ng (`keep` / `improve` / `improve_or_off`) cho t\u1eebng listing d\u1ef1a tr\u00ean `scenarios_rules`.\n- **Ngu\u1ed3n:** c\u00f9ng JSON dashboard \u2014 filter theo product, VM, level CTR/CR/ROAS.\n- **Hi\u1ec3n th\u1ecb:** b\u1ea3ng k\u00e8m `cause`, `fix_listing`, `fix_ads`; sort theo m\u1ee9c \u0111\u1ed9 \u01b0u ti\u00ean action.\n- **Flow diagram:** [flows/02_listing_improvement.md](flows/02_listing_improvement.md).\n\n### 3.3 Performance Hub \u2014 Listing Scale Up (pill `perf-sub-scaleup`)\n- **M\u1ee5c ti\u00eau:** x\u00e1c \u0111\u1ecbnh listing c\u00f3 t\u00edn hi\u1ec7u lan to\u1ea3 (CTR/CR/ROAS \u0111\u1ec1u pass) \u0111\u1ec3 m\u1edf r\u1ed9ng ng\u00e2n s\u00e1ch & scale.\n- **Ngu\u1ed3n:** c\u00f9ng JSON dashboard \u2014 l\u1ecdc `action='keep'` + ROAS \u2265 2.5 theo ph\u00e2n kh\u00fac product.\n- **Hi\u1ec3n th\u1ecb:** bubble chart (size = revenue, tr\u1ee5c = CR \u00d7 ROAS), b\u1ea3ng candidates.\n- **Flow diagram:** [flows/03_listing_scaleup.md](flows/03_listing_scaleup.md).\n\n### 3.4 Internal Ads Import (pill `perf-sub-import`)\n- **M\u1ee5c ti\u00eau:** \u0111\u01b0a screenshot b\u00e1o c\u00e1o ads Etsy v\u00e0o DB.\n- **Pipeline:**\n  1. **Upload** \u2014 drag-drop PNG/JPG/WebP, validate (10KB\u201320MB, \u2265200\u00d7200).\n  2. **Extract** \u2014 Claude/Gemini Vision ph\u00e2n lo\u1ea1i \"listing summary\" vs \"keyword table\", tr\u00edch xu\u1ea5t fields, merge theo `listing_id`.\n  3. **Preview** \u2014 2 b\u1ea3ng editable cho ng\u01b0\u1eddi QA ch\u1ec9nh s\u1eeda.\n  4. **Confirm** \u2014 `DELETE WHERE (listing_id, period, no_vm)` \u2192 `INSERT`; snapshot ra `data/processed/snapshots/{batch_id}.json`; xo\u00e1 raw images.\n  5. **Discard / Rollback** \u2014 hu\u1ef7 tr\u01b0\u1edbc khi confirm / revert sau khi confirm (load snapshot).\n- **State:** `import_batch.status`.\n- **Flow diagram:** [flows/04_internal_import.md](flows/04_internal_import.md).\n\n### 3.5 Research Hub \u2014 Market Trend Intelligence\n- **M\u1ee5c ti\u00eau:** ph\u00e2n t\u00edch d\u1eef li\u1ec7u Etsy crawl \u0111\u1ec3 ch\u1ecdn s\u1ea3n ph\u1ea9m may \u0111\u01b0\u1ee3c (sewable).\n- **Ngu\u1ed3n:** b\u1ea3ng `market_listing` (crawler ch\u1ea1y weekly `data/crawler/crawl_weekly.py`).\n- **Output:** 8 chart (market share, hot rate, price range, discount, emerging\u2026) + filter \"sewable only\".\n- **Flow diagram:** [flows/05_research_hub.md](flows/05_research_hub.md).\n\n### 3.6 Listings CRUD\n- **M\u1ee5c ti\u00eau:** qu\u1ea3n l\u00fd catalog n\u1ed9i b\u1ed9 (th\u00eam/s\u1eeda/xo\u00e1/\u0111\u00e1nh d\u1ea5u tr\u1ea1ng th\u00e1i) v\u00e0 l\u01b0u output AI optimize.\n- **Backend:** `services/listing_service.py` + `routes/listings.py`.\n- **Flow diagram:** [flows/06_listings_crud.md](flows/06_listings_crud.md).\n\n---\n\n## 4. Ng\u01b0\u1ee1ng & quy \u01b0\u1edbc nghi\u1ec7p v\u1ee5\n\n| Ch\u1ec9 s\u1ed1 | Ng\u01b0\u1ee1ng \"high\" | Target business |\n|---|---|---|\n| CTR | \u2265 1.5% | \u2265 2% |\n| CR | \u2265 3% | \u2265 4% |\n| ROAS | \u2265 2.0 (break-even) | \u2265 2.5 (scale-up) |\n\nBanding ROAS:\n- `profitable` \u2265 2.0\n- `slight_loss` 1.0 \u2013 1.99\n- `heavy_loss` > 0 v\u00e0 < 1.0\n- `no_sales` = 0\n\n---\n\n## 5. Build & run\n\n```bash\n# Backend\ncd backend\npip install -r requirements.txt\nuvicorn app.main:app --reload --port 8000\n\n# Crawler (weekly)\ncd data/crawler\npython crawl_weekly.py\n```\n\nFrontend \u0111\u01b0\u1ee3c serve b\u1eb1ng FastAPI static (`backend/app/main.py`) \u2014 truy c\u1eadp `/` load `index.html`.\n\n---\n\n## 6. Tham chi\u1ebfu\n\n- [CLAUDE.md](../CLAUDE.md) \u2014 quy t\u1eafc code theo layer\n- [PERFORMANCE_HUB_RULES.md](../PERFORMANCE_HUB_RULES.md) \u2014 spec chi ti\u1ebft Performance Hub\n- [RESEARCH_HUB_RULES.md](../RESEARCH_HUB_RULES.md) \u2014 spec Research Hub\n- [docs/DESIGN.md](DESIGN.md) \u2014 design system\n- [docs/PLAN_INTERNAL_ADS_PIPELINE.md](PLAN_INTERNAL_ADS_PIPELINE.md) \u2014 spec g\u1ed1c pipeline Internal Import\n- [data-dictionary.html](../data-dictionary.html) \u2014 data dictionary d\u1ea1ng HTML\n" },

        LS[(\"listings\")]\n        ILD[(\"internal_listing_details\")]\n        RE[(\"references_engine\")]\n    end\n\n    %% \u2500\u2500 B\u01b0\u1edbc 2a \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    subgraph S2A[\"B\u01b0\u1edbc 2a \u2014 ETL (Th\u1ee9 2)\"]\n        ETL[\"etl_listings.py\\nUPSERT latest non-null per listing_id\"]\n    end\n\n    %% \u2500\u2500 B\u01b0\u1edbc 2b \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    subgraph S2B[\"B\u01b0\u1edbc 2b \u2014 Internal Crawler (sau ETL)\"]\n        ILC[\"internal_listing_crawler.py\\n+ _detail_extract.js\\nCDP \u00b7 human scroll \u00b7 checkpoint\"]\n    end\n\n    %% \u2500\u2500 B\u01b0\u1edbc 3 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    subgraph S3[\"B\u01b0\u1edbc 3 \u2014 Reference Engine\"]\n        REF[\"POST /references/refresh\\nreferences_service.py\\nmap category \u2192 market_listing top-N\"]\n        FE[\"GET /references/{listing_id}\\nFrontend render\"]\n        REF --> FE\n    end\n\n    %% \u2500\u2500 Market crawl (\u0111\u1ed9c l\u1eadp) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    subgraph SM[\"Ph\u1ee5 l\u1ee5c \u2014 Market Crawl (ch\u1ea1y \u0111\u1ed9c l\u1eadp)\"]\n        direction TB\n        MBS[\"market_batch_scraper.py\\nkeyword \u2192 search + detail pages\"]\n        KRC[\"keyword_rank_crawler.py\\nkeyword \u2192 rank snapshot\"]\n    end\n\n    subgraph DB2[\"etsy_market_db\"]\n        ML[(\"market_listing\\nmarket_listing_details\\nmarket_listing_reviews\\nmarket_shop\")]\n        KRS[(\"keyword_rank_snapshot\")]\n    end\n\n    %% \u2500\u2500 Flow edges \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    MAN -->|\"\u1ea3nh screenshot\"| S1\n    CF -->|\"ghi\"| LR\n    CF -->|\"ghi\"| KR\n\n    EXT -->|\"ghi\"| LR\n    EXT -->|\"ghi\"| KR\n    \n    GHA --> S2A\n    LR -->|\"\u0111\u1ecdc\"| ETL\n    ETL -->|\"UPSERT\"| LS\n\n    GHA --> S2B\n    LS -->|\"\u0111\u1ecdc URLs\"| ILC\n    ETSY -->|\"crawl detail page\"| ILC\n    ILC -->|\"UPSERT\"| ILD\n\n    PORTAL --> S3\n    LS -->|\"\u0111\u1ecdc category\"| REF\n    ML -->|\"\u0111\u1ecdc market ref\"| REF\n    ILD -->|\"\u0111\u1ecdc details\"| REF\n    REF -->|\"UPSERT\"| RE\n\n    ETSY -->|\"crawl search + detail\"| MBS\n    MBS -->|\"ghi\"| ML\n    ETSY -->|\"crawl rank\"| KRC\n    KRC -->|\"ghi\"| KRS\n\n    %% \u2500\u2500 Styles \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    classDef actor  fill:#1e3a5f,color:#fff,stroke:#4a90d9\n    classDef step   fill:#1a3a2a,color:#d4f0d4,stroke:#4caf50\n    classDef db     fill:#2a1a3a,color:#e8d4f0,stroke:#9c27b0\n    classDef market fill:#3a2a1a,color:#f0e4d4,stroke:#ff9800\n\n    class EXT,GHA,PORTAL,ETSY actor\n    class S1,S2A,S2B,S3 step\n    class DB1,LR,KR,LS,ILD,RE db\n    class SM,DB2,ML,KRS market\n\n```\n\n---\n\n## B\u01b0\u1edbc 1 \u2014 Upload d\u1eef li\u1ec7u n\u1ed9i b\u1ed9 (Extension)\n\n**Trigger:** User b\u1ea5m n\u00fat tr\u00ean Chrome Extension \u2192 g\u1eedi \u1ea3nh screenshot m\u00e0n h\u00ecnh Etsy Ads l\u00ean backend.\n\n**Tool:** FastAPI endpoints t\u1ea1i `nguyenphamdieuhien.online/backend/app/api/routes/internal.py`\n**Logic:** `nguyenphamdieuhien.online/backend/app/services/internal_service.py`\n\n| Sub-b\u01b0\u1edbc | Endpoint | Ghi ch\u00fa |\n|---|---|---|\n| Upload \u1ea3nh | `POST /api/v1/internal/upload` | Validate size (10KB\u201320MB), dimension \u2265200\u00d7200, t\u1ea1o `import_batch` |\n| Extract | `POST /api/v1/internal/extract` | Claude Vision ch\u1ea1y song song (t\u1ed1i \u0111a 5 \u1ea3nh), parse ra metrics |\n| User review | *(tr\u00ean Extension UI)* | User xem preview, ch\u1ec9nh s\u1eeda n\u1ebfu sai |\n| Confirm | `POST /api/v1/internal/confirm` | Ghi v\u00e0o DB, x\u00f3a \u1ea3nh raw |\n| (Rollback n\u1ebfu c\u1ea7n) | `POST /api/v1/internal/rollback` | X\u00f3a rows theo `import_time`, gi\u1eef snapshot JSON |\n\n**DB \u0111\u01b0\u1ee3c ghi:**\n- `etsy_pilot.listing_report` \u2014 metrics c\u1ea5p listing (views, clicks, orders, revenue, spend, ROAS, price, stock, category)\n- `etsy_pilot.keyword_report` \u2014 metrics c\u1ea5p keyword (clicks, orders, spend, revenue, ROAS, relevant)\n\n---\n\n## B\u01b0\u1edbc 2 \u2014 ETL + Crawl n\u1ed9i b\u1ed9 (T\u1ef1 \u0111\u1ed9ng, Th\u1ee9 2 h\u00e0ng tu\u1ea7n)\n\n### 2a. ETL: t\u1ed5ng h\u1ee3p `listing_report` \u2192 `listings`\n\n**Trigger:** GitHub Actions cron, th\u1ee9 2 h\u00e0ng tu\u1ea7n (Monday afternoon).\n\n**Tool:** `nguyenphamdieuhien.online/data/crawler/etl_listings.py`\n\n```bash\npython3 etl_listings.py\n```\n\n**Logic:**\n- V\u1edbi m\u1ed7i `listing_id` trong `listing_report`, l\u1ea5y gi\u00e1 tr\u1ecb non-null m\u1edbi nh\u1ea5t c\u1ee7a `title`, `category`, `no_vm`, `importer`\n- UPSERT v\u00e0o `listings` \u2014 ch\u1ec9 fill c\u00e1c c\u1ed9t \u0111ang NULL, **kh\u00f4ng overwrite** gi\u00e1 tr\u1ecb \u0111\u00e3 c\u00f3\n- T\u1ef1 \u0111\u1ed9ng sinh `url = https://www.etsy.com/listing/{listing_id}`\n\n**DB:**\n- \u0110\u1ecdc: `etsy_pilot.listing_report`\n- Ghi: `etsy_pilot.listings` (unique per `listing_id`)\n\n---\n\n### 2b. Crawl chi ti\u1ebft listing n\u1ed9i b\u1ed9\n\n**Trigger:** Ch\u1ea1y ngay sau khi ETL 2a ho\u00e0n th\u00e0nh (c\u00f9ng GitHub Actions job, ho\u1eb7c tay n\u1ebfu c\u1ea7n).\n\n**Tool:** `etsy_star_engine/crawler/internal_listing_crawler.py`\n\n```bash\n# Automated to\u00e0n b\u1ed9 (production)\npython3 internal_listing_crawler.py --auto\n\n# Test N listing \u0111\u1ea7u\npython3 internal_listing_crawler.py --auto 5\n\n# Resume n\u1ebfu b\u1ecb gi\u00e1n \u0111o\u1ea1n\npython3 internal_listing_crawler.py --resume 20260504_120000\n```\n\n**Y\u00eau c\u1ea7u:** Chrome \u0111ang m\u1edf v\u1edbi CDP (`--remote-debugging-port=9222`). Script t\u1ef1 launch n\u1ebfu ch\u01b0a m\u1edf.\n\n**JS Extractor:** `etsy_star_engine/crawler/_detail_extract.js` \u2014 inject v\u00e0o browser \u0111\u1ec3 parse DOM.\n\n**Logic:**\n- \u0110\u1ecdc to\u00e0n b\u1ed9 rows t\u1eeb `etsy_pilot.listings` (l\u1ea5y `listing_id`, `url`)\n- V\u1edbi m\u1ed7i URL: navigate \u2192 scroll (human-like) \u2192 ch\u1ea1y JS extractor \u2192 parse price, shipping, shop info, reviews, badge\n- Checkpoint t\u1ef1 \u0111\u1ed9ng sau m\u1ed7i listing \u2192 resume \u0111\u01b0\u1ee3c khi crash\n- Delay 8\u201320s gi\u1eefa c\u00e1c listing\n\n**DB:**\n- \u0110\u1ecdc: `etsy_pilot.listings`\n- Ghi: `etsy_pilot.internal_listing_details` (UPSERT theo `listing_id`)\n\n**Fields l\u01b0u:** `base_price`, `sale_price`, `discount_percent`, `currency`, `materials`, `highlights`, `shipping_status`, `origin_ship_from`, `ship_time_max_days`, `us_shipping`, `return_policy`, `design`, `ai_summary`, `rating`, `review_count`, `badge`, `shop_name`, `owner_name`, `shop_location`, `join_year`, `total_sales`, `shop_rating`, `shop_badge`, `smooth_shipping`, `speedy_replies`\n\n---\n\n## B\u01b0\u1edbc 3 \u2014 T\u1ea3i l\u1ea1i b\u00e1o c\u00e1o (User b\u1ea5m \"T\u1ea3i l\u1ea1i\" tr\u00ean Portal)\n\n**Trigger:** User b\u1ea5m n\u00fat \"T\u1ea3i l\u1ea1i\" tr\u00ean giao di\u1ec7n web \u2192 g\u1ecdi API refresh.\n\n**Tool:** FastAPI endpoint t\u1ea1i `nguyenphamdieuhien.online/backend/app/api/routes/references.py`\n**Logic:** `nguyenphamdieuhien.online/backend/app/services/references_service.py`\n\n```\nPOST /api/v1/references/refresh?top_n=3\nPOST /api/v1/references/refresh?top_n=3&listing_id=4384550669   # refresh 1 listing c\u1ee5 th\u1ec3\n```\n\n**Logic:**\n- V\u1edbi m\u1ed7i listing trong `etsy_pilot.listings`, l\u1ea5y `category`\n- Map `category` \u2192 keyword (vd: `Onesie` \u2192 `onesie`, `Blankets` \u2192 `blanket`)\n- Query `etsy_market_db.market_listing` l\u1ecdc theo `product_type` / `search_tag` kh\u1edbp keyword\n- Rank theo `tag_ranking ASC`, l\u1ea5y top-N\n- UPSERT v\u00e0o `etsy_pilot.references_engine`\n\n**DB:**\n- \u0110\u1ecdc: `etsy_pilot.listings`, `etsy_market_db.market_listing`\n- Ghi: `etsy_pilot.references_engine`\n\n**FE \u0111\u1ecdc k\u1ebft qu\u1ea3:**\n```\nGET /api/v1/references                        # t\u1ea5t c\u1ea3\nGET /api/v1/references/{listing_id}           # 1 listing\n```\n\n---\n\n## Ph\u1ee5 l\u1ee5c \u2014 Market Crawl (\u0110\u1ed9c l\u1eadp, ch\u1ea1y ri\u00eang)\n\n\u0110\u00e2y l\u00e0 lu\u1ed3ng **song song**, crawl d\u1eef li\u1ec7u th\u1ecb tr\u01b0\u1eddng theo keyword \u2014 kh\u00f4ng ph\u1ee5 thu\u1ed9c v\u00e0o 3 b\u01b0\u1edbc tr\u00ean.\n\n**Tool:** `etsy_star_engine/crawler/market_batch_scraper.py`\n\n```bash\npython3 market_batch_scraper.py --auto\npython3 market_batch_scraper.py --auto 10\npython3 market_batch_scraper.py --resume 20260504_120000\n```\n\n**Keywords ngu\u1ed3n:** `nguyenphamdieuhien.online/data/crawler/vm01_keywords.json`\n\n**DB \u0111\u01b0\u1ee3c ghi (etsy_market_db):**\n- `market_listing` \u2014 overview t\u1eeb search results (price, rating, badge, rank)\n- `market_listing_details` \u2014 chi ti\u1ebft trang listing (materials, shipping, design)\n- `market_listing_reviews` \u2014 reviews\n- `market_shop` \u2014 th\u00f4ng tin shop\n\n**Rank Tracking (ri\u00eang bi\u1ec7t):**\n\n```bash\npython3 etsy_star_engine/crawler/keyword_rank_crawler.py --auto\n# ho\u1eb7c suggest keyword t\u1eeb LLM:\npython3 etsy_star_engine/crawler/keyword_rank_crawler.py --product \"custom baby onesie\"\n```\n\n**DB \u0111\u01b0\u1ee3c ghi:** `etsy_market_db.keyword_rank_snapshot`\n\n---\n\n## B\u1ea3ng t\u00f3m t\u1eaft\n\n| B\u01b0\u1edbc | Tool / Script | Trigger | DB \u0110\u1ecdc | DB Ghi |\n|---|---|---|---|---|\n| 1. Upload + Extract | `internal.py` + `internal_service.py` | Extension \u2192 API | `import_batch` | `listing_report`, `keyword_report` |\n| 2a. ETL | `etl_listings.py` | GitHub Actions (Th\u1ee9 2) | `listing_report` | `listings` |\n| 2b. Crawl n\u1ed9i b\u1ed9 | `internal_listing_crawler.py` | Sau ETL | `listings` | `internal_listing_details` |\n| 3. T\u1ea3i l\u1ea1i b\u00e1o c\u00e1o | `references.py` + `references_service.py` | User b\u1ea5m Portal | `listings`, `market_listing` | `references_engine` |\n| (Market crawl) | `market_batch_scraper.py` | Th\u1ee7 c\u00f4ng / cron | `vm01_keywords.json` | `market_listing*`, `market_shop` |\n| (Rank tracking) | `keyword_rank_crawler.py` | Th\u1ee7 c\u00f4ng / cron | `keyword_report` | `keyword_rank_snapshot` |\n" },
