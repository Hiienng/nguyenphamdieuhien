<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Etsy Internal Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans:  'Inter', 'Helvetica Neue', Arial, sans-serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      --font-serif: 'Georgia', serif;
      --near-black:   #1a1714;
      --charcoal:     #2c2825;
      --stone:        #7a7370;
      --parchment:    #f5f1ec;
      --warm-sand:    #ede8e1;
      --border-cream: #ddd8d0;
      --terracotta:   #c0714a;
      --bg:           #faf7f4;
    }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--charcoal); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .nav { height: 52px; display: flex; align-items: center; padding: 0 24px; gap: 24px; background: var(--parchment); border-bottom: 1px solid var(--border-cream); flex-shrink: 0; }
    .nav-brand { font-family: var(--font-sans); font-size: 0.90rem; font-weight: 700; color: var(--near-black); text-decoration: none; letter-spacing: -0.01em; }
    .nav-brand span { color: var(--terracotta); }
    .nav-back { font-size: 0.80rem; color: var(--stone); text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .nav-back:hover { color: var(--charcoal); }
    .nav-title { font-size: 0.80rem; font-weight: 600; color: var(--charcoal); letter-spacing: 0.04em; text-transform: uppercase; }
    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 240px; flex-shrink: 0; background: var(--parchment); border-right: 1px solid var(--border-cream); overflow-y: auto; padding: 16px 0; }
    .sidebar-section { padding: 0 12px 8px; font-size: 0.64rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--stone); }
    .sidebar-item { display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer; padding: 7px 16px; font-family: var(--font-sans); font-size: 0.78rem; color: var(--charcoal); line-height: 1.4; border-left: 3px solid transparent; transition: background 0.1s, border-color 0.1s; }
    .sidebar-item:hover { background: var(--warm-sand); }
    .sidebar-item.active { border-left-color: var(--terracotta); background: var(--warm-sand); font-weight: 600; color: var(--terracotta); }
    .sidebar-item.is-docx { color: var(--stone); font-style: italic; }
    .sidebar-item.is-docx::after { content: ' .docx'; font-size: 0.64rem; opacity: 0.6; }
    .content { flex: 1; overflow-y: auto; padding: 36px 48px; max-width: 900px; }
    .doc-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--stone); }
    .doc-placeholder svg { opacity: 0.3; }
    .doc-placeholder p { font-size: 0.84rem; }
    .docx-notice { display: flex; flex-direction: column; gap: 10px; padding: 24px; border: 1px solid var(--border-cream); border-radius: 8px; background: var(--parchment); max-width: 480px; }
    .docx-notice strong { font-size: 0.90rem; }
    .docx-notice p { font-size: 0.80rem; color: var(--stone); line-height: 1.6; }
    .docx-notice a { font-size: 0.80rem; color: var(--terracotta); font-weight: 600; }
    .md-body { font-size: 0.88rem; line-height: 1.75; color: var(--charcoal); }
    .md-body h1 { font-family: var(--font-serif); font-size: 1.60rem; font-weight: 700; margin-bottom: 20px; color: var(--near-black); border-bottom: 2px solid var(--border-cream); padding-bottom: 10px; }
    .md-body h2 { font-size: 1.10rem; font-weight: 700; margin: 28px 0 10px; color: var(--near-black); }
    .md-body h3 { font-size: 0.94rem; font-weight: 700; margin: 20px 0 8px; color: var(--charcoal); }
    .md-body h4 { font-size: 0.86rem; font-weight: 700; margin: 16px 0 6px; color: var(--stone); text-transform: uppercase; letter-spacing: 0.05em; }
    .md-body p { margin-bottom: 12px; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin-bottom: 4px; }
    .md-body code { font-family: var(--font-mono); font-size: 0.80rem; background: var(--warm-sand); border: 1px solid var(--border-cream); border-radius: 3px; padding: 1px 5px; color: var(--terracotta); }
    .md-body pre { background: var(--warm-sand); border: 1px solid var(--border-cream); border-radius: 6px; padding: 14px 16px; overflow-x: auto; margin: 12px 0; }
    .md-body pre code { background: none; border: none; padding: 0; color: var(--charcoal); font-size: 0.78rem; }
    .md-body blockquote { border-left: 3px solid var(--terracotta); padding: 6px 14px; margin: 12px 0; color: var(--stone); background: var(--warm-sand); border-radius: 0 4px 4px 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.82rem; }
    .md-body th { background: var(--warm-sand); font-weight: 700; text-align: left; padding: 6px 10px; border: 1px solid var(--border-cream); }
    .md-body td { padding: 6px 10px; border: 1px solid var(--border-cream); }
    .md-body tr:nth-child(even) td { background: var(--parchment); }
    .md-body a { color: var(--terracotta); text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border-cream); margin: 24px 0; }
    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/app" class="nav-brand">GetifyCo<span>.</span></a>
  <a href="/app" class="nav-back">← Back</a>
  <span class="nav-title">Docs</span>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content">
    <div class="doc-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <p>Chọn một tài liệu từ sidebar.</p>
    </div>
  </main>
</div>

<script>
const DOCS = [{"label": "Hướng dẫn sử dụng", "group": "guide", "content": "# Hướng dẫn sử dụng — GetifyCo Listing Portal\n\nTài liệu này đi theo đúng **3 nhu cầu của bạn**. Mỗi nhu cầu trả lời 3 câu: **(1) Nhu cầu là gì → (2) Kết quả xem ở đâu → (3) Phải vận hành thế nào để ra kết quả đó.**\n\n> Trước tiên: dữ liệu trong app đến từ **extension** quét trang Etsy Ads rồi ghi thẳng vào **Neon DB của bạn**. App không tự lấy dữ liệu — bạn phải quét định kỳ (vd mỗi tuần). Không có dữ liệu thì không phần nào hiển thị.\n\n---\n\n## Nhu cầu 1 — \"Listing / keyword nào đang lời, đang lỗ?\"\n\n**▸ Kết quả xem ở đâu**\n- Tab **Action Recommendations**: mỗi listing là 1 thẻ, hàng chỉ số ngay đầu thẻ — **ROAS · Rev-Spend($) · Revenue · Spend · Orders · Views · Clicks · CTR · CR · CPC · CPP**.\n- **Chấm màu** ở cuối hàng tiêu đề thẻ = lời/lỗ tức thì: 🟢 đang lời · 🟠 cần cải thiện · 🔴 lỗ / nên dừng (rê vào xem chữ).\n- Bung thẻ (▸) → bảng **Keywords**: chỉ số của **từng keyword** trong listing.\n\n**▸ Vận hành thế nào**\n1. Cài extension (Firefox) → vào *Settings* của extension, dán **Database connection (Neon)** của bạn.\n2. Mở trang **Etsy Ads** → extension quét → bấm **Add to DB** (listing) và **Add Keywords to DB** (keyword).\n3. Về app → tab **Action Recommendations** → **Refresh** → các thẻ hiện chỉ số.\n\n---\n\n## Nhu cầu 2 — \"Keyword nào nên tắt / mở, vì sao?\"\n\n**▸ Kết quả xem ở đâu**\n- Trong bảng **Keywords** của mỗi listing:\n  - cột **Currently** = đang chạy thật (theo lần quét gần nhất).\n  - cột **Suggestion** = đề xuất hệ thống: **on** (keyword từng ra doanh thu → nên giữ) / **off** (chưa từng ra doanh thu → nên tắt).\n- **🔔 Chuông** trên thẻ = listing này **có keyword đang ON nhưng Suggestion OFF** → có cái nên xem lại để tắt. Bung ra, dòng lệch được tô nền cam.\n- Bung **Details** → **Nguyên nhân · Fix Listing · Fix Ads** (vì sao + nên sửa gì).\n\n**▸ Vận hành thế nào**\n1. Sau khi đã có dữ liệu (Nhu cầu 1), bung thẻ listing.\n2. So cột **Currently** vs **Suggestion**: chỗ `Currently = on` mà `Suggestion = off` chính là keyword đang đốt tiền nhưng chưa ra đơn.\n3. Muốn đổi ngưỡng đánh giá lời/lỗ → tab **Configure Thresholds**.\n\n---\n\n## Nhu cầu 3 — \"Tôi tắt / mở keyword rồi, việc đó có tác động đến performance không?\"\n\n**▸ Kết quả xem ở đâu**\n- Trong thẻ listing, phần **Keyword Track change** (biểu đồ):\n  - đường mặc định **Rev-Spend($) = Revenue − Spend** theo ngày (đổi chỉ số ở góc phải: Spend / Clicks / ROAS…).\n  - **▲ cờ đỏ = mốc bạn đổi keyword** (rê vào xem đổi gì, ngày nào).\n  - So đường biểu đồ **trước vs sau cờ** → biết thay đổi có tác động hay không.\n- Danh sách thao tác liệt kê bên dưới biểu đồ (✕ để xoá 1 dòng).\n\n**▸ Vận hành thế nào**\n1. Khi quyết định tắt/mở 1 keyword → trong bảng Keywords gạt nút **Commit** (on ↔ off). Thao tác này **ghi 1 mốc vào lịch sử** và **cắm cờ ▲** lên biểu đồ tại ngày hôm đó.\n2. Qua **Etsy** tắt/mở keyword đó **thật** (Commit chỉ ghi nhận, không tự thao tác trên Etsy).\n3. **Tuần sau quét lại dữ liệu** → quay lại **Keyword Track change**, nhìn đường **Rev-Spend($)** quanh cờ ▲ để đánh giá hiệu quả.\n\n> Ví dụ (theo ảnh đính kèm): ngày **8/6** bạn gạt Commit *\"Tắt keyword berry first birthday onesie\"* → cờ ▲ đỏ hiện tại 8/6. Tuần sau quét lại, so đường Rev-Spend($) trước/sau 8/6 để biết việc tắt keyword đó có cải thiện lãi ròng không.\n\n---\n\n## Lưu ý quan trọng\n- Dữ liệu **không real-time** — chỉ đổi **sau mỗi lần quét** bằng extension.\n- Tắt/mở trên Etsy → **tuần sau quét mới thấy** cột `Currently` đổi theo.\n- **Commit không tự tắt ad trên Etsy** — chỉ ghi nhận quyết định + đo tác động.\n- Tìm nhanh: ô **search** (ID/title) · lọc **Product / ROAS / VM** · sắp xếp bằng dropdown + nút ↑/↓.\n"}, {"label": "Định nghĩa: Suggestion · Commit · Chuông", "group": "guide", "content": "# Định nghĩa: Suggestion · Commit · Chuông\n\n## Suggestion (đề xuất bật/tắt keyword)\n- **on** — keyword **từng tạo doanh thu (Revenue > 0)** ở bất kỳ listing / kỳ nào trong **toàn bộ lịch sử** → nên **giữ bật**.\n- **off** — **chưa từng** tạo doanh thu → nên **cân nhắc tắt** (đang đốt budget mà chưa ra đơn).\n- Tính trên **toàn lịch sử**, độc lập với kỳ đang xem.\n\n## Currently (trạng thái hiện tại)\n- Trạng thái **on/off thực tế** của keyword tại **lần quét gần nhất** — không phải real-time.\n\n## Commit (nút toggle) — quyết định của bạn\n- Là **quyết định**: gạt để xác nhận *\"tôi sẽ bật/tắt ad keyword này trên Etsy\"*.\n- **Mặc định = Currently**.\n- Mỗi lần gạt → **ghi 1 dòng vào lịch sử tối ưu** (kèm thời gian) + cắm **cờ ▲** lên biểu đồ **Keyword Track change**.\n- **Không tự thao tác trên Etsy** — bạn vẫn phải qua Etsy tắt/mở thật. Commit để **ghi nhận + đo tác động** (so trước/sau cờ).\n- **Khi nào bấm:** thường khi `Suggestion = off` nhưng `Currently = on` (keyword đốt tiền, chưa ra đơn) → gạt Commit về **off** để đánh dấu sẽ tắt. Hoặc ngược lại khi muốn bật lại.\n\n## 🔔 Chuông (cảnh báo keyword)\n- Hiện trên thẻ listing khi **có keyword đang ON nhưng Suggestion = OFF**.\n- Ý nghĩa: listing này có keyword **nên xem lại để tắt**. Bung ra, các dòng lệch được **tô nền cam nhạt**.\n\n## Trạng thái listing (chấm màu cuối hàng)\n- 🟢 **Keep Running** — có sales & đang lời.\n- 🟠 **Improve** — cần cải thiện.\n- 🔴 **Improve / Pause** — cân nhắc cải thiện hoặc tạm dừng.\n\n## Công thức chỉ số\n| Chỉ số | Công thức |\n|---|---|\n| ROAS | Revenue / Spend |\n| CTR | Clicks / Views |\n| CR | Orders / Clicks |\n| CPC | Spend / Clicks |\n| CPP | Spend / Orders |\n| **Rev-Spend($)** | **Revenue − Spend** (mặc định của biểu đồ Keyword Track change) |\n"}];

  const GROUPS = [ { label: 'Hướng dẫn', key: 'guide' } ];

  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');

  GROUPS.forEach(g => {
    const items = DOCS.filter(d => d.group === g.key);
    if (!items.length) return;
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="sidebar-section">${g.label}</div>`;
    items.forEach((doc, i) => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item' + (doc.isDocx ? ' is-docx' : '');
      btn.textContent = doc.label;
      btn.addEventListener('click', () => { showDoc(doc, btn); location.hash = g.key + '-' + i; });
      sec.appendChild(btn);
    });
    sidebar.appendChild(sec);
  });

  const _firstItem = sidebar.querySelector('.sidebar-item');
  if (_firstItem) _firstItem.click();

  function showDoc(doc, btn) {
    sidebar.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (doc.isDocx) {
      const dlUrl = location.protocol === 'file:' ? '../docs/' + doc.file : '/md-docs/' + doc.file;
      content.innerHTML = `<div style="padding-top:20px"><div class="docx-notice">
        <strong>${doc.label}</strong>
        <p>File <code>.docx</code> không thể render trực tiếp trên trình duyệt.<br>Tải về để mở bằng Word hoặc Google Docs.</p>
        <a href="${dlUrl}" download>⬇ Tải xuống ${doc.file}</a>
      </div></div>`;
    } else {
      content.innerHTML = `<div class="md-body">${marked.parse(doc.content)}</div>`;
      content.scrollTop = 0;
    }
  }
</script>
</body>
</html>
