<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Etsy Internal Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-sans:  'Inter', 'Helvetica Neue', Arial, sans-serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      --font-serif: 'Georgia', serif;
      --near-black:   #1a1714;
      --charcoal:     #2c2825;
      --stone:        #7a7370;
      --parchment:    #f5f1ec;
      --warm-sand:    #ede8e1;
      --border-cream: #ddd8d0;
      --terracotta:   #c0714a;
      --bg:           #faf7f4;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--charcoal);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Nav ── */
    .nav {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
      background: var(--parchment);
      border-bottom: 1px solid var(--border-cream);
      flex-shrink: 0;
    }
    .nav-brand {
      font-family: var(--font-sans);
      font-size: 0.90rem;
      font-weight: 700;
      color: var(--near-black);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .nav-brand span { color: var(--terracotta); }
    .nav-back {
      font-size: 0.80rem;
      color: var(--stone);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-back:hover { color: var(--charcoal); }
    .nav-title {
      font-size: 0.80rem;
      font-weight: 600;
      color: var(--charcoal);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--parchment);
      border-right: 1px solid var(--border-cream);
      overflow-y: auto;
      padding: 16px 0;
    }
    .sidebar-section {
      padding: 0 12px 8px;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--stone);
    }
    .sidebar-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px 16px;
      font-family: var(--font-sans);
      font-size: 0.78rem;
      color: var(--charcoal);
      line-height: 1.4;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .sidebar-item:hover { background: var(--warm-sand); }
    .sidebar-item.active {
      border-left-color: var(--terracotta);
      background: var(--warm-sand);
      font-weight: 600;
      color: var(--terracotta);
    }
    .sidebar-item.is-docx {
      color: var(--stone);
      font-style: italic;
    }
    .sidebar-item.is-docx::after {
      content: ' .docx';
      font-size: 0.64rem;
      opacity: 0.6;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 36px 48px;
      max-width: 900px;
    }

    .doc-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--stone);
    }
    .doc-placeholder svg { opacity: 0.3; }
    .doc-placeholder p { font-size: 0.84rem; }

    .docx-notice {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 24px;
      border: 1px solid var(--border-cream);
      border-radius: 8px;
      background: var(--parchment);
      max-width: 480px;
    }
    .docx-notice strong { font-size: 0.90rem; }
    .docx-notice p { font-size: 0.80rem; color: var(--stone); line-height: 1.6; }
    .docx-notice a {
      font-size: 0.80rem;
      color: var(--terracotta);
      font-weight: 600;
    }

    /* ── Markdown rendered content ── */
    .md-body { font-size: 0.88rem; line-height: 1.75; color: var(--charcoal); }
    .md-body h1 { font-family: var(--font-serif); font-size: 1.60rem; font-weight: 700; margin-bottom: 20px; color: var(--near-black); border-bottom: 2px solid var(--border-cream); padding-bottom: 10px; }
    .md-body h2 { font-size: 1.10rem; font-weight: 700; margin: 28px 0 10px; color: var(--near-black); }
    .md-body h3 { font-size: 0.94rem; font-weight: 700; margin: 20px 0 8px; color: var(--charcoal); }
    .md-body h4 { font-size: 0.86rem; font-weight: 700; margin: 16px 0 6px; color: var(--stone); text-transform: uppercase; letter-spacing: 0.05em; }
    .md-body p { margin-bottom: 12px; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin-bottom: 4px; }
    .md-body code {
      font-family: var(--font-mono);
      font-size: 0.80rem;
      background: var(--warm-sand);
      border: 1px solid var(--border-cream);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--terracotta);
    }
    .md-body pre {
      background: var(--warm-sand);
      border: 1px solid var(--border-cream);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--charcoal);
      font-size: 0.78rem;
    }
    .md-body blockquote {
      border-left: 3px solid var(--terracotta);
      padding: 6px 14px;
      margin: 12px 0;
      color: var(--stone);
      background: var(--warm-sand);
      border-radius: 0 4px 4px 0;
    }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.82rem; }
    .md-body th { background: var(--warm-sand); font-weight: 700; text-align: left; padding: 6px 10px; border: 1px solid var(--border-cream); }
    .md-body td { padding: 6px 10px; border: 1px solid var(--border-cream); }
    .md-body tr:nth-child(even) td { background: var(--parchment); }
    .md-body a { color: var(--terracotta); text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border-cream); margin: 24px 0; }
    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">Etsy - Internal portal<span>.</span></a>
  <a href="index.html" class="nav-back">← Back</a>
  <span class="nav-title">Docs</span>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content">
    <div class="doc-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <p>Chọn một tài liệu từ sidebar.</p>
    </div>
  </main>
</div>

<script>
  const DOCS = [
    { label: 'Flow 01 — Performance Hub',        file: '/md-docs/01_performance_hub.md' },
    { label: 'Flow 02 — Listing Improvement',    file: '/md-docs/02_listing_improvement.md' },
    { label: 'Flow 03 — Listing Scale-up',       file: '/md-docs/03_listing_scaleup.md' },
    { label: 'Flow 04 — Internal Import',        file: '/md-docs/04_internal_import.md' },
    { label: 'Flow 05 — Research Hub',           file: '/md-docs/05_research_hub.md' },
    { label: 'Flow 06 — Listings CRUD',          file: '/md-docs/06_listings_crud.md' },
    { label: 'Performance Hub Rules',            file: '/md-docs/PERFORMANCE_HUB_RULES.md' },
    { label: 'Research Hub Rules',               file: '/md-docs/RESEARCH_HUB_RULES.md' },
    { label: 'Plan — Internal Ads Pipeline',     file: '/md-docs/PLAN_INTERNAL_ADS_PIPELINE.md' },
    { label: 'Technical Doc',                    file: '/md-docs/TECHNICAL_DOC.md' },
    { label: 'Operation Workflow',               file: '/md-docs/OPERATION_WORKFLOW.md' },
    { label: 'Etsy POD Listing Guide 2026',      file: '/md-docs/Etsy_POD_Listing_Guide_2026.docx',      isDocx: true },
    { label: 'Star Engine Data Modeling',        file: '/md-docs/etsy_star_engine_data_modeling.docx',   isDocx: true },
    { label: 'Internal DB — Data Modeling',     file: '/md-docs/data-modeling-intdb.md' },
  ];

  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');

  // Group: Flows, Rules & Plans, Reference
  const groups = [
    { label: 'Flows',          items: DOCS.filter(d => d.file.startsWith('/md-docs/0')) },
    { label: 'Rules & Plans',  items: DOCS.filter(d => d.file.match(/RULES|PLAN/)) },
    { label: 'Technical',      items: DOCS.filter(d => d.file.match(/TECHNICAL|OPERATION|data-modeling/)) },
    { label: 'Reference',      items: DOCS.filter(d => d.isDocx) },
  ];

  groups.forEach(g => {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="sidebar-section">${g.label}</div>`;
    g.items.forEach(doc => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item' + (doc.isDocx ? ' is-docx' : '');
      btn.textContent = doc.label;
      btn.dataset.file = doc.file;
      btn.addEventListener('click', () => loadDoc(doc, btn));
      sec.appendChild(btn);
    });
    sidebar.appendChild(sec);
  });

  // Load doc from hash on page load
  const hash = location.hash.slice(1);
  if (hash) {
    const match = DOCS.find(d => d.file === decodeURIComponent(hash));
    if (match) {
      const btn = sidebar.querySelector(`[data-file="${match.file}"]`);
      if (btn) loadDoc(match, btn);
    }
  }

  async function loadDoc(doc, btn) {
    sidebar.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    location.hash = encodeURIComponent(doc.file);

    if (doc.isDocx) {
      content.innerHTML = `<div style="padding-top:20px"><div class="docx-notice">
        <strong>${doc.label}</strong>
        <p>File <code>.docx</code> không thể render trực tiếp trên trình duyệt.<br>Tải về để mở bằng Word hoặc Google Docs.</p>
        <a href="${doc.file}" download>⬇ Tải xuống ${doc.file.split('/').pop()}</a>
      </div></div>`;
      return;
    }

    content.innerHTML = `<div style="color:var(--stone);font-size:0.80rem;padding-top:20px">Đang tải…</div>`;
    try {
      const res = await fetch(doc.file);
      if (!res.ok) throw new Error(res.status);
      const md = await res.text();
      content.innerHTML = `<div class="md-body">${marked.parse(md)}</div>`;
      content.scrollTop = 0;
    } catch (e) {
      content.innerHTML = `<div style="color:#b53333;font-size:0.82rem;padding-top:20px">Không tải được tài liệu: ${doc.file}</div>`;
    }
  }
</script>
</body>
</html>
